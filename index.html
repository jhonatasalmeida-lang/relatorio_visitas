<script>
// Lógica do Modo Escuro
function toggleDarkMode() {
    const body = document.body;
    const icon = document.getElementById("theme-icon");
    
    body.classList.toggle("dark-mode");
    
    if (body.classList.contains("dark-mode")) {
        icon.innerText = "☀️";
        localStorage.setItem("theme", "dark");
    } else {
        icon.innerText = "🌙";
        localStorage.setItem("theme", "light");
    }
}

// Persistência do tema ao recarregar
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
    document.getElementById("theme-icon").innerText = "☀️";
}

// MANTENDO TODA A SUA LÓGICA ORIGINAL ABAIXO
async function gerarPDF(){
    let valido = true;
    document.querySelectorAll(".erro").forEach(el => el.classList.remove("erro"));

    document.querySelectorAll(".obrigatorio").forEach(el => {
        if(!el.value || el.value === "Selecione..."){
            el.classList.add("erro");
            valido = false;
        }
    });

    const algumCheck = document.querySelectorAll(".dependencia:checked, .item:checked").length;
    if(algumCheck === 0){
        alert("Selecione ao menos um item ou dependência.");
        return;
    }

    if(!valido){
        alert("Preencha todos os campos obrigatórios.");
        return;
    }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    const escola = document.getElementById("escola").value;
    const tecnico = document.getElementById("tecnico").value;
    const outro = document.getElementById("outro").value;
    const textareas = document.querySelectorAll("textarea");
    const defeitos = textareas[0].value;
    const solucoes = textareas[1].value;

    const dependencias = [...document.querySelectorAll(".dependencia:checked")]
        .map(c => c.parentElement.innerText.trim());
    if(outro) dependencias.push("Outro: " + outro);

    const itens = [...document.querySelectorAll(".item:checked")]
        .map(c => c.parentElement.innerText.trim());

    let y = 15;
    function checkPage(neededHeight = 0){ 
        if(y + neededHeight > 275){ 
            pdf.addPage(); 
            y = 20; 
            return true;
        }
        return false;
    }

    function tituloCentro(txt){
        pdf.setFont("helvetica","bold");
        pdf.setFontSize(12);
        pdf.text(txt,105,y,{align:"center"});
        y+=6;
    }

    function caixa(titulo, texto){
        const padding = 3;
        const lineHeight = 5;
        const larguraUtil = 180;
        
        pdf.setFont("helvetica","bold");
        pdf.setFontSize(10);
        
        const linhas = pdf.splitTextToSize(texto || "-", larguraUtil);
        const alturaBox = (linhas.length * lineHeight) + (padding * 2);
        
        // Verifica se a caixa inteira cabe, se não, pula página
        checkPage(alturaBox + 10);

        pdf.text(titulo, 12, y);
        y += 4;
        
        pdf.setFont("helvetica","normal");
        pdf.setDrawColor(180);
        pdf.rect(10, y - 1, 190, alturaBox);
        
        linhas.forEach((linha, i) => {
            pdf.text(linha, 12, y + padding + (i * lineHeight));
        });

        y += alturaBox + 8;
    }

    // --- Início do Conteúdo ---
    tituloCentro("GOVERNO DO ESTADO DE SÃO PAULO");
    tituloCentro("Secretaria da Educação");
    tituloCentro("RELATÓRIO DE VISITA TÉCNICA - URE de CAIEIRAS");
    pdf.setDrawColor(0);
    pdf.line(10, y, 200, y);
    y += 10;

    caixa("Escola:", escola);
    caixa("Técnico:", tecnico);
    caixa("Dependências Verificadas:", dependencias.join(", "));
    caixa("Itens Verificados:", itens.join(", "));
    caixa("Defeitos Encontrados:", defeitos);
    caixa("Soluções / Orientações:", solucoes);

    // --- Fotos ---
    const files = document.getElementById("fotos").files;
    if(files.length > 0){
        pdf.addPage();
        y = 20;
        tituloCentro("REGISTRO FOTOGRÁFICO");
        y += 10;

        for(let i = 0; i < files.length; i++){
            const base64 = await toBase64(files[i]);
            const dim = await getImageDimensions(base64);
            
            // Calcula largura e altura proporcional (Max 170mm de largura)
            const maxWidth = 170;
            const imgWidth = maxWidth;
            const imgHeight = (dim.h * maxWidth) / dim.w;

            // Se a imagem for muito alta e não couber na página, reduz ela
            let finalHeight = imgHeight;
            let finalWidth = imgWidth;
            if (finalHeight > 220) {
                finalHeight = 220;
                finalWidth = (dim.w * 220) / dim.h;
            }

            // Verifica se tem espaço na página atual, senão pula
            checkPage(finalHeight + 10);

            // Centraliza a imagem horizontalmente
            const xCentrado = (210 - finalWidth) / 2;
            
            pdf.setDrawColor(200);
            pdf.rect(xCentrado - 1, y - 1, finalWidth + 2, finalHeight + 2); // Moldura
            pdf.addImage(base64, "JPEG", xCentrado, y, finalWidth, finalHeight);
            
            y += finalHeight + 15;
        }
    }

    // Rodapé com data e página
    const pageCount = pdf.internal.getNumberOfPages();
    for(let i = 1; i <= pageCount; i++) {
        pdf.setPage(i);
        pdf.setFontSize(8);
        pdf.setTextColor(100);
        pdf.text("Data: " + new Date().toLocaleDateString("pt-BR"), 10, 290);
        pdf.text("Página " + i + " de " + pageCount, 180, 290);
    }

    pdf.save(`Relatorio_${escola.replace(/ /g,"_")}.pdf`);
}

// Função auxiliar para pegar o tamanho real da imagem
function getImageDimensions(file) {
  return new Promise (function (resolved, rejected) {
    var i = new Image();
    i.onload = function(){
      resolved({w: i.width, h: i.height});
    };
    i.src = file;
  });
}

function toBase64(file){
    return new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}
