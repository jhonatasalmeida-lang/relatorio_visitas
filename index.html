<script>
// DATA AUTOMÁTICA
const hoje = new Date();
document.getElementById("dataAtual").innerText =
    hoje.toLocaleDateString("pt-BR");

// PDF OTIMIZADO (SEM TRAVAR)
async function gerarPDF(){

    const { jsPDF } = window.jspdf;

    const element = document.getElementById("relatorio");
    const escola = document.getElementById("escola").value || "Relatorio";

    // pequena pausa pra garantir render
    await new Promise(r => setTimeout(r, 300));

    const canvas = await html2canvas(element, {
        scale: 1,
        useCORS: true
    });

    const imgData = canvas.toDataURL("image/jpeg", 0.9);

    const pdf = new jsPDF("p", "mm", "a4");

    const imgWidth = 210;
    const pageHeight = 295;
    const imgHeight = canvas.height * imgWidth / canvas.width;

    let heightLeft = imgHeight;
    let position = 0;

    pdf.addImage(imgData, "JPEG", 0, position, imgWidth, imgHeight);
    heightLeft -= pageHeight;

    // quebra de página automática
    while (heightLeft > 0) {
        position = heightLeft - imgHeight;
        pdf.addPage();
        pdf.addImage(imgData, "JPEG", 0, position, imgWidth, imgHeight);
        heightLeft -= pageHeight;
    }

    pdf.save(`Relatorio_${escola.replace(/ /g,"_")}.pdf`);
}
</script>
