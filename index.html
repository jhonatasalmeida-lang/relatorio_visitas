<script>
async function gerarPDF(){

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    const escola = document.getElementById("escola").value || "-";
    const tecnico = document.getElementById("tecnico").value || "-";
    const outro = document.getElementById("outro").value;

    const textareas = document.querySelectorAll("textarea");
    const defeitos = textareas[0].value || "-";
    const solucoes = textareas[1].value || "-";

    const dependencias = [...document.querySelectorAll(".dependencia:checked")]
        .map(c => c.parentElement.innerText.trim());

    if(outro) dependencias.push("Outro: " + outro);

    const itens = [...document.querySelectorAll(".item:checked")]
        .map(c => c.parentElement.innerText.trim());

    let y = 15;

    function checkPage(){
        if(y > 260){
            pdf.addPage();
            y = 15;
        }
    }

    function tituloCentro(txt){
        pdf.setFont("helvetica","bold");
        pdf.setFontSize(12);
        pdf.text(txt,105,y,{align:"center"});
        y+=6;
    }

    function caixa(titulo, texto){

    checkPage();

    const padding = 3;
    const lineHeight = 5;

    pdf.setFont("helvetica","bold");
    pdf.setFontSize(10);
    pdf.text(titulo,12,y);

    y += 4;

    const linhas = pdf.splitTextToSize(texto || "-", 180);

    // 🔥 altura correta da caixa
    const altura = (linhas.length * lineHeight) + (padding * 2);

    // desenha caixa
    pdf.rect(10, y - padding, 190, altura);

    pdf.setFont("helvetica","normal");

    // 🔥 texto agora respeita padding interno
    linhas.forEach((linha, i)=>{
        pdf.text(linha, 12, y + (i * lineHeight));
    });

    y += altura + 6;
}

    // ===== CABEÇALHO =====
    tituloCentro("GOVERNO DO ESTADO DE SÃO PAULO");
    tituloCentro("Secretaria da Educação");
    tituloCentro("RELATÓRIO DE VISITA TÉCNICA");

    pdf.line(10,y,200,y);
    y+=8;

    // ===== CONTEÚDO =====
    caixa("Escola:", escola);
    caixa("Técnico:", tecnico);
    caixa("Dependências Verificadas:", dependencias.join(", "));
    caixa("Itens Verificados:", itens.join(", "));
    caixa("Defeitos Encontrados:", defeitos);
    caixa("Soluções / Orientações:", solucoes);

    // ===== FOTOS (CORRIGIDO) =====
    const files = document.getElementById("fotos").files;

    if(files.length > 0){

        pdf.addPage();
        y = 15;

        tituloCentro("REGISTRO FOTOGRÁFICO");

        for(let i=0; i<files.length; i++){

            const file = files[i];

            const base64 = await toBase64(file);

            checkPage();

            pdf.addImage(base64, "JPEG", 15, y, 180, 100);
            y += 110;
        }
    }

    // ===== DATA =====
    pdf.setFontSize(9);
    pdf.text("Data: " + new Date().toLocaleDateString("pt-BR"),10,290);

    pdf.save(`Relatorio_${escola.replace(/ /g,"_")}.pdf`);
}

// 🔥 FUNÇÃO AUXILIAR (ESSENCIAL)
function toBase64(file){
    return new Promise((resolve, reject)=>{
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

function abrirDrive(){
    window.open("https://drive.google.com","_blank");
}
