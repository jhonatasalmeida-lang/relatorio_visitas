<script>
// TEMA
function toggleDarkMode() {
    const body = document.body;
    body.classList.toggle("dark-mode");
    const isDark = body.classList.contains("dark-mode");
    document.getElementById("theme-icon").innerText = isDark ? "☀️" : "🌙";
    localStorage.setItem("theme", isDark ? "dark" : "light");
}
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark-mode");
    document.getElementById("theme-icon").innerText = "☀️";
}

// UTILITARIOS
function copiarTexto(texto) {
    navigator.clipboard.writeText(texto);
}

function toBase64(file){
    return new Promise((resolve)=>{
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
    });
}

function getImageDimensions(file) {
  return new Promise ((resolved) => {
    var i = new Image();
    i.onload = function(){ resolved({w: i.width, h: i.height}); };
    i.src = file;
  });
}

// PDF
async function gerarPDF(){
    let valido = true;
    document.querySelectorAll(".erro").forEach(el => el.classList.remove("erro"));
    document.querySelectorAll(".obrigatorio").forEach(el => {
        if(!el.value || el.value.includes("Selecione")){ el.classList.add("erro"); valido = false; }
    });

    if(!valido){ alert("Preencha os campos obrigatórios."); return; }

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();
    
    // --- GERADOR DE NOME DO ARQUIVO ---
    const escola = document.getElementById("escola").value;
    const tecnico = document.getElementById("tecnico").value;
    const d = new Date();
    const dia = String(d.getDate()).padStart(2, '0');
    const mes = String(d.getMonth() + 1).padStart(2, '0');
    const ano = d.getFullYear();
    const tecnicoNome = tecnico.split(' ')[0];
    const escolaLimpa = escola.replace("Escola Estadual ", "").substring(0, 15).trim();
    
    // PADRÃO: RVT_Escola_DD-MM-AAAA_Tecnico.pdf
    const nomeArquivo = `RVT_${escolaLimpa}_${dia}-${mes}-${ano}_${tecnicoNome}.pdf`.replace(/\s+/g, '_');

    const outro = document.getElementById("outro").value;
    const textareas = document.querySelectorAll("textarea");
    const dependencias = [...document.querySelectorAll(".dependencia:checked")].map(c => c.parentElement.innerText.trim());
    if(outro) dependencias.push("Outro: " + outro);
    const itens = [...document.querySelectorAll(".item:checked")].map(c => c.parentElement.innerText.trim());

    let y = 15;
    function checkPage(h = 0){ if(y + h > 275){ pdf.addPage(); y = 20; return true; } return false; }
    function tituloCentro(txt){ pdf.setFont("helvetica","bold"); pdf.setFontSize(12); pdf.text(txt,105,y,{align:"center"}); y+=6; }
    function caixa(tit, txt){
        const linhas = pdf.splitTextToSize(txt || "-", 180);
        const hBox = (linhas.length * 5) + 6;
        checkPage(hBox + 10);
        pdf.setFont("helvetica","bold"); pdf.setFontSize(10); pdf.text(tit, 12, y); y += 4;
        pdf.setFont("helvetica","normal"); pdf.setDrawColor(180); pdf.rect(10, y-1, 190, hBox);
        linhas.forEach((l, i) => pdf.text(l, 12, y + 3 + (i * 5)));
        y += hBox + 7;
    }

    tituloCentro("GOVERNO DO ESTADO DE SÃO PAULO");
    tituloCentro("Secretaria da Educação");
    tituloCentro("RELATÓRIO DE VISITA TÉCNICA - URE de CAIEIRAS");
    pdf.line(10, y, 200, y); y += 10;

    caixa("Escola:", escola);
    caixa("Técnico:", tecnico);
    caixa("Dependências:", dependencias.join(", "));
    caixa("Itens:", itens.join(", "));
    caixa("Defeitos:", textareas[0].value);
    caixa("Soluções:", textareas[1].value);

    const files = document.getElementById("fotos").files;
    if(files.length > 0){
        pdf.addPage(); y = 20; tituloCentro("REGISTRO FOTOGRÁFICO"); y += 10;
        for(let i = 0; i < files.length; i++){
            const b64 = await toBase64(files[i]);
            const dim = await getImageDimensions(b64);
            let fW = 170; let fH = (dim.h * 170) / dim.w;
            if (fH > 200) { fH = 200; fW = (dim.w * 200) / dim.h; }
            checkPage(fH + 10);
            pdf.setDrawColor(220); pdf.rect((210-fW)/2 - 0.5, y - 0.5, fW + 1, fH + 1);
            pdf.addImage(b64, "JPEG", (210-fW)/2, y, fW, fH);
            y += fH + 12;
        }
    }

    pdf.save(nomeArquivo);
    copiarTexto(nomeArquivo);

    setTimeout(() => {
        if(confirm(`✅ Gerado: ${nomeArquivo}\n\nNome copiado! Abrir o Drive?`)) abrirDrive();
    }, 600);
}
