<script>
function gerarPDF(){
    const element = document.getElementById("relatorio");

    html2pdf().from(element).set({
        margin:0.5,
        filename:'relatorio_visita.pdf',
        html2canvas:{scale:2},
        jsPDF:{unit:'in',format:'a4'}
    }).save();
}

function abrirDrive(){
    window.open("https://drive.google.com", "_blank"); // coloque sua pasta aqui depois
}
