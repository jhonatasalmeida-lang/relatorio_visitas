<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Visitas Técnicas</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', Arial;
    background:#f1f5f9;
}

/* HEADER */
header{
    background:linear-gradient(135deg,#1e3a8a,#2563eb);
    color:white;
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
}

/* CONTAINER */
.container{
    padding:20px;
    max-width:1200px;
    margin:auto;
}

/* FILTROS */
.filtros{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
}

.filtros input, .filtros select{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

/* CARDS */
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:12px;
    padding:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
    transition:0.2s;
}

.card:hover{
    transform:scale(1.02);
}

.preventiva{
    border-left:6px solid #16a34a;
}

.corretiva{
    border-left:6px solid #dc2626;
}

.top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:8px;
}

.badge{
    padding:4px 8px;
    border-radius:6px;
    color:white;
    font-size:12px;
}

.prev{background:#16a34a;}
.corr{background:#dc2626;}

.vazio{
    text-align:center;
    color:#777;
    margin-top:50px;
    font-size:18px;
}

</style>
</head>

<body>

<header>Painel de Visitas Técnicas</header>

<div class="container">

<div class="filtros">
    <input type="date" id="fData">

    <select id="fMunicipio"></select>
    <select id="fTecnico"></select>

    <select id="fTipo">
        <option value="">Todos os Tipos</option>
        <option>Preventiva</option>
        <option>Corretiva</option>
    </select>
</div>

<div class="cards" id="cards"></div>

<div id="vazio" class="vazio" style="display:none;">
    Nenhum resultado encontrado
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzSnemMI0Rqo3GK67Dm4lwoOaep56hsm4pVqZ6AOeh64oGxSER3r4keZXcYjZmO59s/exec"; // 🔴 COLE A URL DO APPS SCRIPT AQUI

let dados = [];

/* =========================
   CARREGAR DADOS DA API
========================= */
async function carregar(){
    try{
        const res = await fetch(URL);
        dados = await res.json();

        popularFiltros();
        render();

    }catch(e){
        alert("Erro ao carregar dados");
        console.error(e);
    }
}

/* =========================
   FORMATAR DATA BR
========================= */
function formatarDataBR(data){
    let [ano, mes, dia] = data.split("-");
    return `${dia}/${mes}/${ano}`;
}

/* =========================
   FILTROS
========================= */
function popularFiltros(){

    let municipios = [...new Set(dados.map(d=>d.municipio))];
    let tecnicos = [...new Set(dados.map(d=>d.tecnico))];

    fMunicipio.innerHTML =
        '<option value="">Município</option>' +
        municipios.map(m=>`<option>${m}</option>`).join('');

    fTecnico.innerHTML =
        '<option value="">Técnico</option>' +
        tecnicos.map(t=>`<option>${t}</option>`).join('');
}

/* =========================
   RENDERIZAR CARDS
========================= */
function render(){

    let html = "";

    let filtrado = dados.filter(d => {
        return (!fData.value || d.data === fData.value) &&
               (!fMunicipio.value || d.municipio === fMunicipio.value) &&
               (!fTecnico.value || d.tecnico === fTecnico.value) &&
               (!fTipo.value || d.tipo === fTipo.value);
    });

    if(filtrado.length === 0){
        document.getElementById("cards").innerHTML = "";
        document.getElementById("vazio").style.display = "block";
        return;
    }

    document.getElementById("vazio").style.display = "none";

    filtrado.sort((a,b)=> a.data.localeCompare(b.data));

    filtrado.forEach(d => {

        html += `
        <div class="card ${d.tipo === 'Preventiva' ? 'preventiva' : 'corretiva'}">

            <div class="top">
                <div><strong>${d.escola}</strong></div>
                <div class="badge ${d.tipo === 'Preventiva' ? 'prev':'corr'}">
                    ${d.tipo}
                </div>
            </div>

            <p>📅 ${formatarDataBR(d.data)}</p>
            <p>📍 ${d.municipio}</p>
            <p>👨‍🔧 ${d.tecnico}</p>
            <p>📄 Chamado: ${d.chamado}</p>
            <p>📝 ${d.obs || "-"}</p>

        </div>
        `;
    });

    document.getElementById("cards").innerHTML = html;
}

/* =========================
   EVENTOS
========================= */
document.querySelectorAll("input,select").forEach(e=>{
    e.addEventListener("change", render);
});

/* =========================
   AUTO ATUALIZAÇÃO (opcional)
========================= */
setInterval(carregar, 60000); // atualiza a cada 1 min

carregar();

</script>

</body>
</html>
