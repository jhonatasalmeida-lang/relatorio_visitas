<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitas Tech Pro v8.2 | Google Standard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(22, 28, 45, 0.7);
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --purple: #8b5cf6;
            --input-bg: #0f172a;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            margin: 0; background-color: var(--bg); color: var(--text-main); 
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #05070a 60%);
            min-height: 100vh; width: 100%; overflow-x: hidden;
        }

        nav {
            background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); padding: 0.8rem 2rem;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .nav-links { display: flex; gap: 8px; }
        nav button {
            background: transparent; border: none; color: var(--text-dim);
            padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 12px;
            font-weight: 700; transition: 0.3s; font-size: 0.8rem;
        }
        nav button.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        .container-fluid { width: 100%; padding: 1.5rem; }

        /* KPIS - MODERNIZADOS */
        .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
        .kpi-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 1.2rem; border-radius: 20px; border-left: 4px solid var(--accent);
            backdrop-filter: blur(10px); transition: transform 0.3s;
        }
        .kpi-card:hover { transform: translateY(-3px); }
        .kpi-label { color: var(--text-dim); font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-value { font-size: 1.8rem; font-weight: 800; display: block; margin-top: 5px; }

        /* CALENDÁRIO GOOGLE STYLE */
        .main-grid { display: grid; grid-template-columns: 1fr 400px; gap: 1.5rem; }
        .glass-panel {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 1.5rem; backdrop-filter: blur(10px);
        }

        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .cal-header h3 { margin: 0; font-size: 1.2rem; font-weight: 800; text-transform: capitalize; }
        
        .cal-weekdays { 
            display: grid; grid-template-columns: repeat(7, 1fr); 
            text-align: center; margin-bottom: 10px; 
            color: var(--text-dim); font-size: 0.7rem; font-weight: 800;
        }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        
        .day {
            background: #0b0f1a; aspect-ratio: 1.4; padding: 8px;
            display: flex; flex-direction: column; align-items: flex-start; justify-content: flex-start;
            cursor: pointer; position: relative; transition: 0.2s;
        }
        .day:hover:not(.empty) { background: #161e2e; }
        .day.empty { background: #070a11; color: #2d3748; }
        .day b { font-size: 0.8rem; font-weight: 600; z-index: 2; }
        
        /* Badge de Visitas Estilo Google */
        .visit-pill {
            margin-top: auto; width: 100%;
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: var(--accent); font-size: 10px; font-weight: 800;
            padding: 2px 6px; border-radius: 4px;
            display: flex; align-items: center; gap: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .day.selected { background: rgba(59, 130, 246, 0.2) !important; border: 1px solid var(--accent) !important; z-index: 5; }

        /* CARDS DE DETALHE */
        .visit-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 16px; padding: 1rem; margin-bottom: 1rem;
            border-left: 4px solid #444;
        }
        .visit-item.Preventiva { border-left-color: var(--purple); }
        .visit-item.Corretiva { border-left-color: var(--danger); }

        /* CORREÇÃO DOS SELECTS */
        .filter-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; margin-bottom: 1.5rem; }
        select, input {
            background: var(--input-bg) !important; border: 1px solid var(--border) !important;
            color: #fff !important; padding: 0.8rem; border-radius: 12px; outline: none; font-size: 0.85rem;
        }
        option { background: #0f172a; color: white; }

        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 1000px) { .main-grid { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div id="loader"><div style="width:40px; height:40px; border:4px solid #222; border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite"></div></div>

<nav>
    <div class="nav-content">
        <div style="font-weight: 900; font-size: 1.2rem; color: var(--accent);">V-TECH <span style="color:white">DASH</span></div>
        <div class="nav-links">
            <button class="active" onclick="tab('agenda', this)">CALENDÁRIO</button>
            <button onclick="tab('tecnico', this)">TÉCNICOS</button>
            <button onclick="tab('escola', this)">ESCOLAS</button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="kpi-grid">
        <div class="kpi-card" style="border-left-color: var(--accent)"><span class="kpi-label">Total Geral</span><span class="kpi-value" id="k-tot">0</span></div>
        <div class="kpi-card" style="border-left-color: var(--warning)"><span class="kpi-label">Agendadas</span><span class="kpi-value" id="k-age" style="color:var(--warning)">0</span></div>
        <div class="kpi-card" style="border-left-color: var(--success)"><span class="kpi-label">Concluídas</span><span class="kpi-value" id="k-con" style="color:var(--success)">0</span></div>
        <div class="kpi-card" style="border-left-color: var(--purple)"><span class="kpi-label">Preventivas</span><span class="kpi-value" id="k-pre" style="color:var(--purple)">0</span></div>
        <div class="kpi-card" style="border-left-color: var(--danger)"><span class="kpi-label">Corretivas</span><span class="kpi-value" id="k-cor" style="color:var(--danger)">0</span></div>
    </div>

    <section id="agenda" class="tabs">
        <div class="main-grid">
            <div class="glass-panel">
                <div class="cal-header">
                    <h3 id="mLabel"></h3>
                    <div style="display:flex; gap:10px">
                        <button onclick="moveMonth(-1)" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem">❮</button>
                        <button onclick="viewDate = new Date(); refresh();" style="background:rgba(255,255,255,0.05); border:1px solid var(--border); color:white; padding:4px 12px; border-radius:8px; font-size:0.7rem; cursor:pointer">Hoje</button>
                        <button onclick="moveMonth(1)" style="background:none; border:none; color:white; cursor:pointer; font-size:1.2rem">❯</button>
                    </div>
                </div>
                
                <div class="cal-weekdays">
                    <div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div>
                </div>
                <div class="cal-grid" id="calendar"></div>
            </div>
            
            <div class="glass-panel">
                <h4 id="dTitle" style="margin:0 0 1rem 0; font-size:0.7rem; color:var(--text-dim); text-transform: uppercase; letter-spacing:1px">Visitas do Dia</h4>
                <div id="dList"></div>
            </div>
        </div>
    </section>

    <section id="tecnico" class="tabs" style="display:none">
        <div class="glass-panel">
            <div class="filter-row">
                <select id="sTec"></select>
                <input type="text" id="iBusca" placeholder="Pesquisar escola...">
                <button onclick="window.print()" style="background:#fff; color:#000; border:none; padding:0 15px; border-radius:10px; font-weight:800; cursor:pointer; font-size:0.8rem">PDF</button>
            </div>
            <div id="tList"></div>
            <div style="height:300px; margin-top:2rem"><canvas id="chartTec"></canvas></div>
        </div>
    </section>

    <section id="escola" class="tabs" style="display:none">
        <div class="glass-panel">
            <select id="sEsc" style="width:100%; margin-bottom:1.5rem"></select>
            <div id="eHist"></div>
        </div>
    </section>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxbDpoifeIgJn7ciehq2WIMpPRt-8fYKL3LcrWRIqzz_RSUOwJwD5E_GEIpO-1rLKM/exec";
let db = [];
let viewDate = new Date();
let myChart = null;

async function init() {
    try {
        const res = await fetch(URL);
        const data = await res.json();
        db = data.filter(r => r.escola && r.escola.toString().trim() !== "");
        document.getElementById('loader').style.display = 'none';
        setupFilters();
        refresh();
    } catch(e) { console.error(e); }
}

function refresh() {
    document.getElementById('k-tot').innerText = db.length;
    document.getElementById('k-age').innerText = db.filter(r => r.status === 'Agendada').length;
    document.getElementById('k-con').innerText = db.filter(r => r.status === 'Concluída').length;
    document.getElementById('k-pre').innerText = db.filter(r => r.tipo === 'Preventiva').length;
    document.getElementById('k-cor').innerText = db.filter(r => r.tipo === 'Corretiva').length;
    renderCal();
    renderTec();
    renderChart();
}

function renderCal() {
    const grid = document.getElementById('calendar'); grid.innerHTML = '';
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    const mNames = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    document.getElementById('mLabel').innerText = `${mNames[m]} ${y}`;

    const firstDay = new Date(y, m, 1).getDay();
    const lastDate = new Date(y, m + 1, 0).getDate();
    const prevLastDate = new Date(y, m, 0).getDate();

    // Dias do mês anterior
    for (let i = firstDay; i > 0; i--) {
        const dEl = document.createElement('div');
        dEl.className = 'day empty';
        dEl.innerHTML = `<b>${prevLastDate - i + 1}</b>`;
        grid.appendChild(dEl);
    }

    // Dias do mês atual
    for (let d = 1; d <= lastDate; d++) {
        const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const visits = db.filter(v => v.data === dStr);
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        dayEl.innerHTML = `<b>${d}</b>`;
        
        if(visits.length > 0) {
            dayEl.innerHTML += `<div class="visit-pill"><span>●</span> ${visits.length} Visitas</div>`;
        }

        dayEl.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
            dayEl.classList.add('selected');
            showDay(dStr, visits);
        };
        grid.appendChild(dayEl);
    }
}

function showDay(date, list) {
    document.getElementById('dTitle').innerText = `VISITAS: ${date.split('-').reverse().join('/')}`;
    document.getElementById('dList').innerHTML = list.length ? list.map(itemTemplate).join('') : '<p style="color:var(--text-dim); font-size:0.8rem">Sem compromissos.</p>';
}

function itemTemplate(v) {
    return `
        <div class="visit-item ${v.tipo}">
            <div style="display:flex; justify-content:space-between; align-items:start">
                <div>
                    <div style="font-weight:700; font-size:1rem">${v.escola}</div>
                    <div style="color:var(--text-dim); font-size:0.75rem; margin-top:2px">📍 ${v.municipio}</div>
                </div>
                <span style="font-size:9px; font-weight:800; color:${v.status === 'Agendada' ? 'var(--warning)' : 'var(--success)'}">${v.status.toUpperCase()}</span>
            </div>
            <div style="margin-top:1rem; display:flex; justify-content:space-between; font-size:0.75rem; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px">
                <span style="color:var(--accent); font-weight:600">👨‍🔧 ${v.tecnico}</span>
                <span style="color:var(--text-dim)">${v.tipo}</span>
            </div>
        </div>
    `;
}

function renderChart() {
    const ctx = document.getElementById('chartTec').getContext('2d');
    if(myChart) myChart.destroy();
    const tecs = [...new Set(db.map(r => r.tecnico))].filter(t => t);
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: tecs,
            datasets: [
                { label: 'Concluídas', data: tecs.map(t => db.filter(r => r.tecnico === t && r.status === 'Concluída').length), backgroundColor: '#10b981' },
                { label: 'Agendadas', data: tecs.map(t => db.filter(r => r.tecnico === t && r.status === 'Agendada').length), backgroundColor: '#3b82f6' }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
            scales: {
                x: { ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { display: false } },
                y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
        }
    });
}

function setupFilters() {
    const tecs = [...new Set(db.map(r => r.tecnico))].filter(t => t).sort();
    const escs = [...new Set(db.map(r => r.escola))].filter(e => e).sort();
    document.getElementById('sTec').innerHTML = '<option value="">Todos Técnicos</option>' + tecs.map(t => `<option>${t}</option>`).join('');
    document.getElementById('sEsc').innerHTML = '<option value="">Selecionar Escola...</option>' + escs.map(e => `<option>${e}</option>`).join('');
    document.getElementById('sTec').onchange = renderTec;
    document.getElementById('iBusca').oninput = renderTec;
    document.getElementById('sEsc').onchange = renderEsc;
}

function renderTec() {
    const t = document.getElementById('sTec').value, b = document.getElementById('iBusca').value.toLowerCase();
    const l = db.filter(r => (!t || r.tecnico === t) && r.escola.toLowerCase().includes(b));
    document.getElementById('tList').innerHTML = l.map(itemTemplate).join('');
}

function renderEsc() {
    const e = document.getElementById('sEsc').value;
    const l = db.filter(r => r.escola === e);
    document.getElementById('eHist').innerHTML = l.map(itemTemplate).join('');
}

function tab(id, b) {
    document.querySelectorAll('.tabs').forEach(t => t.style.display = 'none');
    document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    b.classList.add('active');
}

function moveMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); renderCal(); }
init();
</script>
</body>
</html>
