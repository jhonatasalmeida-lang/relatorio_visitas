<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitas Tech Pro v8.3 | Enterprise Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Cores Dark Mode (Padrão) */
            --bg: #05070a;
            --card-bg: rgba(22, 28, 45, 0.7);
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --purple: #8b5cf6;
            --input-bg: #0f172a;
            --cal-day: #0b0f1a;
            --cal-empty: #070a11;
            --nav-bg: rgba(5, 7, 10, 0.8);
        }

        /* Cores Light Mode */
        body.light-mode {
            --bg: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.1);
            --text-main: #1e293b;
            --text-dim: #64748b;
            --input-bg: #ffffff;
            --cal-day: #ffffff;
            --cal-empty: #f8fafc;
            --nav-bg: rgba(255, 255, 255, 0.9);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            margin: 0; background-color: var(--bg); color: var(--text-main); 
            background-image: radial-gradient(circle at 50% 0%, var(--input-bg) 0%, var(--bg) 60%);
            min-height: 100vh; width: 100%; overflow-x: hidden;
            transition: background 0.3s, color 0.3s;
        }

        nav {
            background: var(--nav-bg); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); padding: 0.8rem 2rem;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .nav-links { display: flex; gap: 8px; }
        nav button {
            background: transparent; border: none; color: var(--text-dim);
            padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 12px;
            font-weight: 700; transition: 0.3s; font-size: 0.8rem;
        }
        nav button.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        .container-fluid { width: 100%; padding: 1.5rem; }

        .kpi-container { 
            display: flex; 
            gap: 1.5rem; 
            margin-bottom: 2rem; 
            flex-wrap: wrap; 
            align-items: stretch;
        }

        .kpi-group { 
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            padding: 20px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
        }
        
        body.light-mode .kpi-group { background: rgba(0, 0, 0, 0.02); }

        .kpi-group.group-total { flex: 0.5; min-width: 180px; }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            height: 20px;
        }

        .group-title { 
            font-size: 0.65rem; 
            font-weight: 900; 
            color: var(--accent); 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }

        .progress-wrapper { height: 16px; margin-bottom: 8px; }
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(128, 128, 128, 0.1);
            border-radius: 10px;
            overflow: hidden;
            display: none; 
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            width: 0%;
            transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .kpi-row {
            display: flex;
            gap: 12px;
            width: 100%;
            flex: 1;
        }

        .kpi-card {
            flex: 1;
            background: var(--card-bg); 
            border: 1px solid var(--border);
            padding: 1.2rem; 
            border-radius: 20px; 
            border-left: 4px solid var(--accent);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .kpi-card:hover {
            background: rgba(128, 128, 128, 0.05);
            transform: translateY(-3px);
        }

        .kpi-label { color: var(--text-dim); font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-value { font-size: 2rem; font-weight: 800; display: block; margin-top: 5px; }

        .main-grid { display: grid; grid-template-columns: 1fr 400px; gap: 1.5rem; }
        .glass-panel {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 1.5rem; backdrop-filter: blur(10px);
        }
        
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 10px; color: var(--text-dim); font-size: 0.7rem; font-weight: 800; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        
        .day { background: var(--cal-day); aspect-ratio: 1.4; padding: 8px; display: flex; flex-direction: column; cursor: pointer; transition: 0.2s; border: 0.1px solid var(--border); }
        .day:hover:not(.empty) { background: rgba(59, 130, 246, 0.1); }
        .day.empty { background: var(--cal-empty); color: var(--text-dim); opacity: 0.5; }
        .day.selected { background: rgba(59, 130, 246, 0.2) !important; border: 1px solid var(--accent) !important; z-index: 5; }
        .visit-pill { margin-top: auto; width: 100%; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: var(--accent); font-size: 9px; font-weight: 800; padding: 2px 4px; border-radius: 4px; }

        .visit-item {
            background: rgba(128,128,128,0.03); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem; border-left: 4px solid #444;
        }
        .visit-item.Preventiva { border-left-color: var(--purple); }
        .visit-item.Corretiva { border-left-color: var(--danger); }
        .obs-box { background: rgba(245, 158, 11, 0.05); border: 1px dashed rgba(245, 158, 11, 0.3); border-radius: 8px; padding: 8px; margin-top: 10px; font-size: 0.75rem; color: var(--text-main); line-height: 1.4; }

        .pagination { display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 20px; padding: 10px; }
        .pg-btn { background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.75rem; transition: 0.3s; }
        
        .filter-row { display: grid; grid-template-columns: 1.2fr 1.2fr 1fr auto; gap: 12px; margin-bottom: 1.5rem; }
        select, input { background: var(--input-bg) !important; border: 1px solid var(--border) !important; color: var(--text-main) !important; padding: 0.8rem; border-radius: 12px; outline: none; width: 100%; }
        
        #loader { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 1000px) { 
            .main-grid { grid-template-columns: 1fr; } 
            .kpi-container { flex-direction: column; }
            .kpi-row { flex-direction: column; }
            .kpi-group { min-width: 100%; }
            .filter-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="loader"><div style="width:40px; height:40px; border:4px solid #222; border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite"></div></div>

<nav>
    <div class="nav-content">
        <div style="font-weight: 900; font-size: 1.2rem; color: var(--accent);">V-TECH <span id="logo-span" style="color:var(--text-main)">PRO</span></div>
        <div class="nav-links">
            <button onclick="toggleTheme()" id="themeBtn" style="color: var(--text-dim)">🌙 ESCURO</button>
            <button class="active" onclick="tab('agenda', this)">CALENDÁRIO</button>
            <button onclick="tab('tecnico', this)">TÉCNICOS</button>
            <button onclick="tab('escola', this)">ESCOLAS</button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    
    <div class="kpi-container">
        
        <div class="kpi-group group-total">
            <div class="group-header"><span class="group-title">📊 Visão Geral</span></div>
            <div class="progress-wrapper"></div> <div class="kpi-row">
                <div class="kpi-card" style="border-left-color: var(--accent)">
                    <span class="kpi-label">Total Geral</span>
                    <span class="kpi-value" id="k-tot">0</span>
                </div>
            </div>
        </div>

        <div class="kpi-group" id="group-status">
            <div class="group-header">
                <span class="group-title">🔔 Status do Chamado</span>
                <span id="perc-label" style="font-size: 0.65rem; font-weight: 800; color: var(--success)">0%</span>
            </div>
            <div class="progress-wrapper">
                <div class="progress-container" id="p-cont"><div class="progress-bar" id="p-bar"></div></div>
            </div>
            <div class="kpi-row">
                <div class="kpi-card" style="border-left-color: var(--warning)">
                    <span class="kpi-label">Agendadas</span>
                    <span class="kpi-value" id="k-age" style="color:var(--warning)">0</span>
                </div>
                <div class="kpi-card" style="border-left-color: var(--success)">
                    <span class="kpi-label">Concluídas</span>
                    <span class="kpi-value" id="k-con" style="color:var(--success)">0</span>
                </div>
            </div>
        </div>

        <div class="kpi-group">
            <div class="group-header"><span class="group-title">🛠️ Tipo de Atendimento</span></div>
            <div class="progress-wrapper"></div> <div class="kpi-row">
                <div class="kpi-card" style="border-left-color: var(--purple)">
                    <span class="kpi-label">Preventivas</span>
                    <span class="kpi-value" id="k-pre" style="color:var(--purple)">0</span>
                </div>
                <div class="kpi-card" style="border-left-color: var(--danger)">
                    <span class="kpi-label">Corretivas</span>
                    <span class="kpi-value" id="k-cor" style="color:var(--danger)">0</span>
                </div>
            </div>
        </div>
        
    </div>

    <section id="agenda" class="tabs">
        <div class="main-grid">
            <div class="glass-panel">
                <div class="cal-header"><h3 id="mLabel" style="margin:0; font-size:1.1rem"></h3>
                    <div style="display:flex; gap:8px">
                        <button onclick="moveMonth(-1)" style="background:none; border:none; color:var(--text-main); cursor:pointer; font-weight:800">❮</button>
                        <button onclick="moveMonth(1)" style="background:none; border:none; color:var(--text-main); cursor:pointer; font-weight:800">❯</button>
                    </div>
                </div>
                <div class="cal-weekdays"><div>DOM</div><div>SEG</div><div>TER</div><div>QUA</div><div>QUI</div><div>SEX</div><div>SÁB</div></div>
                <div class="cal-grid" id="calendar"></div>
            </div>
            <div class="glass-panel">
                <h4 id="dTitle" style="margin:0 0 1rem 0; font-size:0.7rem; color:var(--text-dim); text-transform: uppercase;">Visitas do Dia</h4>
                <div id="dList"></div>
            </div>
        </div>
    </section>

    <section id="tecnico" class="tabs" style="display:none">
        <div class="glass-panel">
            <div class="filter-row">
                <select id="sTec"></select>
                <input type="text" id="iBusca" placeholder="Pesquisar unidade...">
                <input type="date" id="iDataFiltro">
                <button onclick="window.print()" style="background:var(--accent); color:#fff; border:none; padding:0 15px; border-radius:10px; font-weight:800; cursor:pointer; font-size:0.8rem">PDF</button>
            </div>
            <div id="tList"></div>
            <div class="pagination" id="tPager"></div>
            <div style="height:250px; margin-top:2rem"><canvas id="chartTec"></canvas></div>
        </div>
    </section>

    <section id="escola" class="tabs" style="display:none">
        <div class="glass-panel">
            <select id="sEsc" style="width:100%; margin-bottom:1.5rem"></select>
            <div id="eHist"></div>
            <div class="pagination" id="ePager"></div>
        </div>
    </section>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxbDpoifeIgJn7ciehq2WIMpPRt-8fYKL3LcrWRIqzz_RSUOwJwD5E_GEIpO-1rLKM/exec";
let db = [], viewDate = new Date(), myChart = null;
let tPage = 1, ePage = 1, pageSize = 10;

async function init() {
    try {
        const res = await fetch(URL);
        const data = await res.json();
        db = data.filter(r => r.escola && r.escola.toString().trim() !== "");
        document.getElementById('loader').style.display = 'none';
        setupFilters(); refresh();
    } catch(e) { console.error(e); }
}

function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    body.classList.toggle('light-mode');
    
    const isLight = body.classList.contains('light-mode');
    btn.innerText = isLight ? "☀️ CLARO" : "🌙 ESCURO";
    
    if(myChart) {
        const textColor = isLight ? '#64748b' : '#94a3b8';
        const gridColor = isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
        myChart.options.plugins.legend.labels.color = textColor;
        myChart.options.scales.x.ticks.color = textColor;
        myChart.options.scales.y.ticks.color = textColor;
        myChart.options.scales.y.grid.color = gridColor;
        myChart.update();
    }
}

function refresh() {
    const age = db.filter(r => r.status === 'Agendada').length;
    const con = db.filter(r => r.status === 'Concluída').length;
    const totalStatus = age + con;
    const perc = totalStatus > 0 ? Math.round((con / totalStatus) * 100) : 0;

    document.getElementById('k-tot').innerText = db.length;
    document.getElementById('k-age').innerText = age;
    document.getElementById('k-con').innerText = con;
    document.getElementById('k-pre').innerText = db.filter(r => r.tipo === 'Preventiva').length;
    document.getElementById('k-cor').innerText = db.filter(r => r.tipo === 'Corretiva').length;

    if(totalStatus > 0) {
        document.getElementById('p-cont').style.display = 'block';
        document.getElementById('p-bar').style.width = perc + '%';
        document.getElementById('perc-label').innerText = perc + '% CONCLUÍDO';
    }

    renderCal(); renderTec(); renderEsc(); renderChart();
}

function itemTemplate(v) {
    const dataFormatada = v.data ? v.data.split('-').reverse().join('/') : '---';
    const numChamado = v.chamado || '---';
    return `<div class="visit-item ${v.tipo}">
        <div style="display:flex; justify-content:space-between; align-items:start">
            <div>
                <div style="font-weight:800; font-size:1.05rem; color:var(--accent)">${v.escola}</div>
                <div style="font-size:0.75rem; color:var(--text-main); margin-top:2px; font-weight:700">🎫 Chamado: ${numChamado}</div>
                <div style="color:var(--text-dim); font-size:0.75rem; margin-top:4px">📍 ${v.municipio} | 📅 ${dataFormatada}</div>
            </div>
            <span style="font-size:9px; font-weight:800; color:${v.status === 'Agendada' ? 'var(--warning)' : 'var(--success)'}; border: 1px solid currentColor; padding: 2px 6px; border-radius:4px">${v.status.toUpperCase()}</span>
        </div>
        <div style="margin-top:1rem; display:flex; justify-content:space-between; font-size:0.8rem; border-top:1px solid var(--border); padding-top:10px">
            <span style="color:var(--text-main); font-weight:600">👨‍🔧 ${v.tecnico}</span>
            <span style="color:var(--text-dim); font-weight:700">${v.tipo}</span>
        </div>
        ${v.observacao ? `<div class="obs-box"><strong>Obs:</strong> ${v.observacao}</div>` : ''}
    </div>`;
}

function renderCal() {
    const grid = document.getElementById('calendar'); grid.innerHTML = '';
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    const mNames = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    document.getElementById('mLabel').innerText = `${mNames[m]} ${y}`;
    const firstDay = new Date(y, m, 1).getDay();
    const lastDate = new Date(y, m+1, 0).getDate();
    for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div class="day empty"></div>';
    for (let d = 1; d <= lastDate; d++) {
        const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const visits = db.filter(v => v.data === dStr);
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        dayEl.innerHTML = `<b>${d}</b>`;
        if(visits.length > 0) dayEl.innerHTML += `<div class="visit-pill">${visits.length} Visitas</div>`;
        dayEl.onclick = () => { document.querySelectorAll('.day').forEach(el => el.classList.remove('selected')); dayEl.classList.add('selected'); showDay(dStr, visits); };
        grid.appendChild(dayEl);
    }
}

function showDay(date, list) {
    document.getElementById('dTitle').innerText = `VISITAS: ${date.split('-').reverse().join('/')}`;
    document.getElementById('dList').innerHTML = list.length ? list.map(itemTemplate).join('') : '<p style="color:var(--text-dim); font-size:0.8rem">Sem registros.</p>';
}

// Substitua APENAS a função renderPager e as chamadas dentro de renderTec/renderEsc por estas:

function renderTec() {
    const t = document.getElementById('sTec').value;
    const b = document.getElementById('iBusca').value.toLowerCase();
    const d = document.getElementById('iDataFiltro').value; 
    
    const filtered = db.filter(r => {
        const matchTec = !t || r.tecnico === t;
        const matchBusca = r.escola.toLowerCase().includes(b);
        const matchData = !d || r.data === d;
        return matchTec && matchBusca && matchData;
    });

    const start = (tPage - 1) * pageSize;
    const paginated = filtered.slice(start, start + pageSize);
    document.getElementById('tList').innerHTML = paginated.map(itemTemplate).join('');
    
    // Chamada corrigida
    renderPager('tPager', filtered.length, tPage, (p) => { 
        tPage = p; 
        renderTec(); 
    });
}

function renderEsc() {
    const e = document.getElementById('sEsc').value;
    const filtered = db.filter(r => r.escola === e);
    const start = (ePage - 1) * pageSize;
    const paginated = filtered.slice(start, start + pageSize);
    document.getElementById('eHist').innerHTML = paginated.map(itemTemplate).join('');
    
    // Chamada corrigida
    renderPager('ePager', filtered.length, ePage, (p) => { 
        ePage = p; 
        renderEsc(); 
    });
}

function renderPager(id, total, current, callback) {
    const totalPages = Math.ceil(total / pageSize);
    const container = document.getElementById(id);
    container.innerHTML = ''; // Limpa o container
    
    if (totalPages <= 1) return;

    const btnPrev = document.createElement('button');
    btnPrev.className = 'pg-btn';
    btnPrev.innerText = 'Anterior';
    btnPrev.disabled = current === 1;
    btnPrev.onclick = () => { window.scrollTo(0,0); callback(current - 1); };

    const span = document.createElement('span');
    span.style.cssText = "font-size:0.8rem; font-weight:700; margin: 0 10px;";
    span.innerText = `Página ${current} de ${totalPages}`;

    const btnNext = document.createElement('button');
    btnNext.className = 'pg-btn';
    btnNext.innerText = 'Próximo';
    btnNext.disabled = current === totalPages;
    btnNext.onclick = () => { window.scrollTo(0,0); callback(current + 1); };

    container.appendChild(btnPrev);
    container.appendChild(span);
    container.appendChild(btnNext);
}

function renderChart() {
    const ctx = document.getElementById('chartTec').getContext('2d');
    if(myChart) myChart.destroy();
    const tecs = [...new Set(db.map(r => r.tecnico))].filter(t => t);
    
    const isLight = document.body.classList.contains('light-mode');
    const textColor = isLight ? '#64748b' : '#94a3b8';
    const gridColor = isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';

    myChart = new Chart(ctx, {
        type: 'bar', data: {
            labels: tecs,
            datasets: [
                { label: 'Concluídas', data: tecs.map(t => db.filter(r => r.tecnico === t && r.status === 'Concluída').length), backgroundColor: '#10b981' },
                { label: 'Agendadas', data: tecs.map(t => db.filter(r => r.tecnico === t && r.status === 'Agendada').length), backgroundColor: '#3b82f6' }
            ]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false, 
            plugins: { legend: { labels: { color: textColor, font: { size: 10 } } } }, 
            scales: { 
                x: { ticks: { color: textColor, font: { size: 10 } }, grid: { display: false } }, 
                y: { ticks: { color: textColor }, grid: { color: gridColor } } 
            } 
        }
    });
}

function setupFilters() {
    const tecs = [...new Set(db.map(r => r.tecnico))].filter(t => t).sort();
    const escs = [...new Set(db.map(r => r.escola))].filter(e => e).sort();
    document.getElementById('sTec').innerHTML = '<option value="">Todos Técnicos</option>' + tecs.map(t => `<option>${t}</option>`).join('');
    document.getElementById('sEsc').innerHTML = '<option value="">Selecionar Escola...</option>' + escs.map(e => `<option>${e}</option>`).join('');
    
    // Eventos para filtros de Técnicos
    document.getElementById('sTec').onchange = () => { tPage = 1; renderTec(); };
    document.getElementById('iBusca').oninput = () => { tPage = 1; renderTec(); };
    document.getElementById('iDataFiltro').onchange = () => { tPage = 1; renderTec(); };
    
    // Evento para filtros de Escolas
    document.getElementById('sEsc').onchange = () => { ePage = 1; renderEsc(); };
}

function tab(id, b) {
    document.querySelectorAll('.tabs').forEach(t => t.style.display = 'none');
    document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    b.classList.add('active');
}

function moveMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); renderCal(); }
init();
</script>
</body>
</html>
