<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitas Tech Pro | Enterprise Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(22, 28, 45, 0.7);
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text-main); 
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #05070a 60%);
            min-height: 100vh;
        }

        /* NAVEGAÇÃO FULL WIDTH */
        nav {
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .nav-links { display: flex; gap: 10px; }
        
        nav button {
            background: transparent; border: 1px solid transparent; color: var(--text-dim);
            padding: 0.7rem 1.5rem; cursor: pointer; border-radius: 12px;
            font-weight: 700; transition: 0.4s; font-size: 0.85rem;
        }
        nav button.active { 
            background: var(--accent); color: white; 
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); border-color: var(--accent);
        }

        /* CONTAINER 100% */
        .container-fluid { width: 100%; padding: 2rem; }

        /* KPIS REVISADOS (5 CARDS) */
        .kpi-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .kpi-card {
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 1.5rem; border-radius: 24px;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .kpi-card::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
        }
        .kpi-total::before { background: var(--accent); }
        .kpi-agend::before { background: var(--warning); }
        .kpi-concl::before { background: var(--success); }
        .kpi-prev::before { background: #8b5cf6; }
        .kpi-corr::before { background: var(--danger); }

        .kpi-label { color: var(--text-dim); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-value { font-size: 2.2rem; font-weight: 800; display: block; margin-top: 8px; }

        /* LAYOUT DASHBOARD */
        .main-layout { display: grid; grid-template-columns: 1fr 450px; gap: 1.5rem; }

        .glass-panel {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 28px; padding: 2rem;
            backdrop-filter: blur(10px);
        }

        /* CALENDÁRIO COM CONTADOR */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day {
            aspect-ratio: 1; border-radius: 16px; border: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; position: relative; transition: 0.3s; background: rgba(255,255,255,0.02);
        }
        .day:hover:not(.empty) { background: rgba(59, 130, 246, 0.1); border-color: var(--accent); transform: translateY(-2px); }
        .day.selected { background: var(--accent) !important; color: white !important; box-shadow: 0 0 15px var(--accent); }
        
        .visit-count {
            position: absolute; top: 8px; right: 8px;
            background: var(--accent); color: white;
            font-size: 10px; font-weight: 800;
            min-width: 18px; height: 18px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* CARDS DE VISITA */
        .visit-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem;
            border-left: 6px solid #444; transition: 0.3s;
        }
        .visit-card.Preventiva { border-left-color: #8b5cf6; }
        .visit-card.Corretiva { border-left-color: var(--danger); }
        
        .badge {
            padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase;
        }
        .bg-agend { background: rgba(245, 158, 11, 0.15); color: var(--warning); border: 1px solid var(--warning); }
        .bg-concl { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid var(--success); }

        /* CONTROLES */
        .filter-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; margin-bottom: 2rem; }
        select, input {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white;
            padding: 1rem; border-radius: 15px; outline: none; transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }

        #loading {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        @media (max-width: 1100px) { 
            .main-layout { grid-template-columns: 1fr; } 
            .kpi-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
        }
    </style>
</head>
<body>

<div id="loading">
    <div style="width: 50px; height: 50px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 20px; font-weight: 700; letter-spacing: 2px;">SISTEMA PRO</p>
</div>

<nav>
    <div class="nav-content">
        <div style="font-weight: 800; font-size: 1.2rem; color: var(--accent);">V-TECH <span style="color: white;">DASHBOARD</span></div>
        <div class="nav-links">
            <button class="active" onclick="switchTab('agenda', this)">📅 CALENDÁRIO</button>
            <button onclick="switchTab('tecnico', this)">👨‍🔧 TÉCNICOS</button>
            <button onclick="switchTab('escola', this)">🏫 UNIDADES</button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="kpi-grid">
        <div class="kpi-card kpi-total">
            <span class="kpi-label">Total Geral</span>
            <span class="kpi-value" id="val-total">0</span>
        </div>
        <div class="kpi-card kpi-agend">
            <span class="kpi-label">Agendadas</span>
            <span class="kpi-value" id="val-agend" style="color: var(--warning)">0</span>
        </div>
        <div class="kpi-card kpi-concl">
            <span class="kpi-label">Concluídas</span>
            <span class="kpi-value" id="val-concl" style="color: var(--success)">0</span>
        </div>
        <div class="kpi-card kpi-prev">
            <span class="kpi-label">Preventivas</span>
            <span class="kpi-value" id="val-prev" style="color: #8b5cf6">0</span>
        </div>
        <div class="kpi-card kpi-corr">
            <span class="kpi-label">Corretivas</span>
            <span class="kpi-value" id="val-corr" style="color: var(--danger)">0</span>
        </div>
    </div>

    <section id="agenda" class="tab-content">
        <div class="main-layout">
            <div class="glass-panel">
                <div class="cal-header">
                    <button onclick="changeMonth(-1)" style="color:white; background:none; border:none; cursor:pointer; font-size: 1.5rem;">❮</button>
                    <h2 id="monthLabel" style="margin:0; font-weight: 800; text-transform: uppercase;"></h2>
                    <button onclick="changeMonth(1)" style="color:white; background:none; border:none; cursor:pointer; font-size: 1.5rem;">❯</button>
                </div>
                <div class="cal-grid" id="calendar"></div>
            </div>
            
            <div class="glass-panel">
                <h3 id="detailTitle" style="margin-top:0; font-size: 1rem; color: var(--text-dim);">SELECIONE UM DIA</h3>
                <div id="dayList">
                    <p style="color: var(--text-dim); font-size: 0.9rem;">Clique em um dia no calendário para ver os detalhes das visitas agendadas.</p>
                </div>
            </div>
        </div>
    </section>

    <section id="tecnico" class="tab-content" style="display:none">
        <div class="glass-panel">
            <div class="filter-row">
                <select id="selTecnico"></select>
                <input type="text" id="searchEsc" placeholder="🔍 Buscar por nome da escola...">
                <button onclick="window.print()" style="background: white; color: black; border: none; padding: 0 20px; border-radius: 12px; font-weight: 800; cursor: pointer;">PDF</button>
            </div>
            <div id="tecList"></div>
            <div style="height: 300px; margin-top: 3rem;">
                <canvas id="tecChart"></canvas>
            </div>
        </div>
    </section>

    <section id="escola" class="tab-content" style="display:none">
        <div class="glass-panel">
            <select id="selEscola" style="width: 100%; margin-bottom: 2rem;"></select>
            <div id="escHistory"></div>
        </div>
    </section>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxbDpoifeIgJn7ciehq2WIMpPRt-8fYKL3LcrWRIqzz_RSUOwJwD5E_GEIpO-1rLKM/exec";

let rawData = [];
let viewDate = new Date();
let chart = null;

async function start() {
    try {
        const res = await fetch(API_URL);
        const data = await res.json();
        // Limpeza absoluta das 500 linhas
        rawData = data.filter(r => r.escola && r.escola.toString().trim() !== "");
        
        document.getElementById('loading').style.display = 'none';
        initFilters();
        refresh();
    } catch (e) {
        alert("Erro ao conectar com a planilha.");
    }
}

function refresh() {
    // Atualizar os 5 KPIs
    document.getElementById('val-total').innerText = rawData.length;
    document.getElementById('val-agend').innerText = rawData.filter(r => r.status === 'Agendada').length;
    document.getElementById('val-concl').innerText = rawData.filter(r => r.status === 'Concluída').length;
    document.getElementById('val-prev').innerText = rawData.filter(r => r.tipo === 'Preventiva').length;
    document.getElementById('val-corr').innerText = rawData.filter(r => r.tipo === 'Corretiva').length;

    renderCalendar();
    renderTecList();
    renderChart();
}

function renderCalendar() {
    const grid = document.getElementById('calendar');
    grid.innerHTML = '';
    const y = viewDate.getFullYear();
    const m = viewDate.getMonth();
    const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    document.getElementById('monthLabel').innerText = `${months[m]} ${y}`;

    const first = new Date(y, m, 1).getDay();
    const last = new Date(y, m + 1, 0).getDate();

    for (let i = 0; i < first; i++) grid.innerHTML += '<div class="day empty" style="opacity:0"></div>';

    for (let d = 1; d <= last; d++) {
        const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const visits = rawData.filter(v => v.data === dStr);
        
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        dayEl.innerHTML = `<b>${d}</b>`;
        
        if(visits.length > 0) {
            dayEl.classList.add('has-visit');
            dayEl.innerHTML += `<div class="visit-count">${visits.length}</div>`;
        }

        dayEl.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
            dayEl.classList.add('selected');
            showDay(dStr, visits);
        };
        grid.appendChild(dayEl);
    }
}

function showDay(date, list) {
    document.getElementById('detailTitle').innerText = `VISITAS EM ${date.split('-').reverse().join('/')}`;
    const listCont = document.getElementById('dayList');
    listCont.innerHTML = list.length ? list.map(cardTemplate).join('') : '<p>Nenhuma visita agendada.</p>';
}

function cardTemplate(v) {
    return `
        <div class="visit-card ${v.tipo}">
            <div style="display:flex; justify-content:space-between; align-items:start">
                <div>
                    <div style="font-weight:800; font-size:1.1rem;">${v.escola}</div>
                    <div style="color:var(--text-dim); font-size:0.8rem; margin-top:4px">📍 ${v.municipio}</div>
                </div>
                <span class="badge ${v.status === 'Agendada' ? 'bg-agend' : 'bg-concl'}">${v.status}</span>
            </div>
            <div style="margin-top:1.2rem; display:flex; justify-content:space-between; font-size:0.8rem; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px">
                <span style="color:var(--accent); font-weight:700">👨‍🔧 ${v.tecnico}</span>
                <span style="font-weight:700">${v.tipo}</span>
            </div>
        </div>
    `;
}

function renderChart() {
    const ctx = document.getElementById('tecChart').getContext('2d');
    if(chart) chart.destroy();
    
    const tecs = [...new Set(rawData.map(r => r.tecnico))].filter(t => t);
    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: tecs,
            datasets: [
                { label: 'Concluídas', data: tecs.map(t => rawData.filter(r => r.tecnico === t && r.status === 'Concluída').length), backgroundColor: '#10b981' },
                { label: 'Agendadas', data: tecs.map(t => rawData.filter(r => r.tecnico === t && r.status === 'Agendada').length), backgroundColor: '#3b82f6' }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#94a3b8', font: { weight: 'bold' } } } },
            scales: {
                x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
                y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
        }
    });
}

function initFilters() {
    const tecs = [...new Set(rawData.map(r => r.tecnico))].filter(t => t).sort();
    const escs = [...new Set(rawData.map(r => r.escola))].filter(e => e).sort();

    document.getElementById('selTecnico').innerHTML = '<option value="">👨‍🔧 Todos os Técnicos</option>' + tecs.map(t => `<option>${t}</option>`).join('');
    document.getElementById('selEscola').innerHTML = '<option value="">🏫 Selecionar Unidade Escolar</option>' + escs.map(e => `<option>${e}</option>`).join('');
    
    document.getElementById('selTecnico').onchange = renderTecList;
    document.getElementById('searchEsc').oninput = renderTecList;
    document.getElementById('selEscola').onchange = renderEscHistory;
}

function renderTecList() {
    const tec = document.getElementById('selTecnico').value;
    const search = document.getElementById('searchEsc').value.toLowerCase();
    const list = rawData.filter(r => (!tec || r.tecnico === tec) && r.escola.toLowerCase().includes(search));
    document.getElementById('tecList').innerHTML = list.map(cardTemplate).join('');
}

function renderEscHistory() {
    const esc = document.getElementById('selEscola').value;
    const list = rawData.filter(r => r.escola === esc);
    document.getElementById('escHistory').innerHTML = list.map(cardTemplate).join('');
}

function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
}

function changeMonth(dir) {
    viewDate.setMonth(viewDate.getMonth() + dir);
    renderCalendar();
}

@keyframes spin { to { transform: rotate(360deg); } }

start();
</script>
</body>
</html>
