<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Visitas Técnicas</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f5f9;
}

/* NAV */
nav{
display:flex;
background:#1e3a8a;
}

nav button{
flex:1;
padding:15px;
border:none;
background:none;
color:white;
cursor:pointer;
transition:0.3s;
}

nav button.active{
background:#2563eb;
font-weight:bold;
}

/* CONTAINER */
.container{padding:20px;}
.hidden{display:none;}

/* CARD MELHORADO */
.card{
background:white;
padding:12px;
margin:8px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.top{
display:flex;
justify-content:space-between;
font-weight:bold;
}

.badge{
padding:2px 8px;
border-radius:6px;
color:white;
font-size:12px;
}

.preventiva{background:green;}
.corretiva{background:red;}

.info{
font-size:14px;
margin-top:5px;
color:#334155;
}

.obs{
margin-top:6px;
font-size:13px;
color:#64748b;
}

/* CALENDÁRIO */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
background:white;
padding:10px;
border-radius:8px;
min-height:90px;
cursor:pointer;
transition:0.2s;
}

.day:hover{
background:#dbeafe;
transform:scale(1.03);
}

.header{
display:grid;
grid-template-columns:repeat(7,1fr);
text-align:center;
font-weight:bold;
margin-bottom:5px;
}

/* SELECT */
select{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:10px;
width:250px;
}

</style>
</head>

<body>

<nav>
<button onclick="trocar('agenda',this)" class="active">📅 Agenda</button>
<button onclick="trocar('tecnico',this)">👨‍🔧 Técnico</button>
<button onclick="trocar('escola',this)">🏫 Escola</button>
</nav>

<div class="container">

<!-- AGENDA -->
<div id="agenda">
<h2>Calendário</h2>

<div class="header">
<div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
</div>

<div id="calendar" class="calendar"></div>
<div id="detalhes"></div>
</div>

<!-- TECNICO -->
<div id="tecnico" class="hidden">
<h2>Por Técnico</h2>
<select id="selTecnico"></select>
<div id="listaTec"></div>
</div>

<!-- ESCOLA -->
<div id="escola" class="hidden">
<h2>Por Escola</h2>
<select id="selEscola"></select>
<div id="listaEsc"></div>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzSnemMI0Rqo3GK67Dm4lwoOaep56hsm4pVqZ6AOeh64oGxSER3r4keZXcYjZmO59s/exec";
let dados=[];

/* TROCAR ABA + ATIVO */
function trocar(id,el){
document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");

document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
el.classList.add("active");
}

/* CARREGAR */
async function carregar(){
let r=await fetch(URL);
dados=await r.json();

montarCalendario();
popularFiltros();

/* 🔥 CORREÇÃO IMPORTANTE */
verTec();
verEsc();
}

/* CALENDÁRIO */
function montarCalendario(){

let hoje=new Date();
let ano=hoje.getFullYear();
let mes=hoje.getMonth();

let primeiro=new Date(ano,mes,1).getDay();
let ultimo=new Date(ano,mes+1,0).getDate();

let mapa={};

dados.forEach(d=>{
mapa[d.data]=(mapa[d.data]||0)+1;
});

let html="";

for(let i=0;i<primeiro;i++) html+="<div></div>";

for(let d=1;d<=ultimo;d++){

let dataStr=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

html+=`
<div class="day" onclick="verDia('${dataStr}')">
<strong>${d}</strong><br>
${mapa[dataStr]?mapa[dataStr]+" visitas":""}
</div>`;
}

calendar.innerHTML=html;
}

/* DETALHES */
function verDia(data){

let lista=dados.filter(x=>x.data===data);

let html=`<h3>${data}</h3>`;

lista.forEach(d=>{
html+=card(d);
});

detalhes.innerHTML=html;
}

/* CARD PADRÃO */
function card(d){
return `
<div class="card">
<div class="top">
<span>${d.escola}</span>
<span class="badge ${d.tipo==='Preventiva'?'preventiva':'corretiva'}">${d.tipo}</span>
</div>

<div class="info">
👨‍🔧 ${d.tecnico}<br>
📍 ${d.municipio}<br>
🆔 Chamado: ${d.chamado || '-'}
</div>

<div class="obs">
📝 ${d.observacao || 'Sem observação'}
</div>
</div>`;
}

/* FILTROS */
function popularFiltros(){

let tecnicos=[...new Set(dados.map(d=>d.tecnico))];
let escolas=[...new Set(dados.map(d=>d.escola))];

selTecnico.innerHTML=tecnicos.map(t=>`<option>${t}</option>`).join("");
selEscola.innerHTML=escolas.map(e=>`<option>${e}</option>`).join("");

selTecnico.onchange=verTec;
selEscola.onchange=verEsc;
}

/* TECNICO */
function verTec(){
let t=selTecnico.value;
let lista=dados.filter(d=>d.tecnico===t);

listaTec.innerHTML=lista.map(card).join("");
}

/* ESCOLA */
function verEsc(){
let e=selEscola.value;
let lista=dados.filter(d=>d.escola===e);

listaEsc.innerHTML=lista.map(card).join("");
}

carregar();

</script>

</body>
</html>
