<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Visitas Técnicas</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f1f5f9;
}

/* MENU */
nav{
    background:#1e3a8a;
    color:white;
    display:flex;
}

nav button{
    flex:1;
    padding:15px;
    border:none;
    background:none;
    color:white;
    cursor:pointer;
    font-size:15px;
}

nav button.active{
    background:#2563eb;
}

/* CONTAINER */
.container{
    padding:20px;
}

/* ESCONDER */
.hidden{display:none}

/* CARDS */
.card{
    background:white;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
}

.preventiva{border-left:5px solid green;}
.corretiva{border-left:5px solid red;}

/* CALENDÁRIO */
.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.day{
    background:white;
    padding:10px;
    border-radius:8px;
    min-height:80px;
    cursor:pointer;
}

.day:hover{
    background:#e2e8f0;
}

.count{
    font-size:12px;
    color:#555;
}

/* DASHBOARD */
.box{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:10px;
}

</style>
</head>

<body>

<nav>
    <button onclick="trocar('agenda')" class="active">📅 Agenda</button>
    <button onclick="trocar('tecnicos')">👨‍🔧 Técnicos</button>
    <button onclick="trocar('dashboard')">📊 Dashboard</button>
</nav>

<div class="container">

<!-- AGENDA -->
<div id="agenda">
    <h2>Agenda Mensal</h2>
    <div id="calendar" class="calendar"></div>
    <div id="detalhesDia"></div>
</div>

<!-- TECNICOS -->
<div id="tecnicos" class="hidden">
    <h2>Roteiro por Técnico</h2>
    <select id="fTecnico"></select>
    <div id="listaTecnico"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
    <h2>Indicadores</h2>
    <div id="indicadores"></div>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzSnemMI0Rqo3GK67Dm4lwoOaep56hsm4pVqZ6AOeh64oGxSER3r4keZXcYjZmO59s/exec";

let dados = [];

/* TROCAR TELA */
function trocar(tela){
    document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
    document.getElementById(tela).classList.remove("hidden");

    document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
}

/* CARREGAR DADOS */
async function carregar(){
    const res = await fetch(URL);
    dados = await res.json();

    montarCalendario();
    popularTecnicos();
    montarDashboard();
}

/* CALENDÁRIO */
function montarCalendario(){

    let map = {};

    dados.forEach(d=>{
        if(!map[d.data]) map[d.data]=0;
        map[d.data]++;
    });

    let html = "";

    Object.keys(map).sort().forEach(data=>{
        html += `
        <div class="day" onclick="verDia('${data}')">
            <strong>${data.split("-")[2]}</strong>
            <div class="count">${map[data]} visitas</div>
        </div>`;
    });

    document.getElementById("calendar").innerHTML = html;
}

/* DETALHE DO DIA */
function verDia(data){

    let lista = dados.filter(d=>d.data===data);

    let html = `<h3>📅 ${data}</h3>`;

    lista.forEach(d=>{
        html += `
        <div class="card ${d.tipo==='Preventiva'?'preventiva':'corretiva'}">
            <strong>${d.escola}</strong><br>
            👨‍🔧 ${d.tecnico}<br>
            📍 ${d.municipio}
        </div>`;
    });

    document.getElementById("detalhesDia").innerHTML = html;
}

/* TÉCNICOS */
function popularTecnicos(){

    let tecnicos = [...new Set(dados.map(d=>d.tecnico))];

    fTecnico.innerHTML = tecnicos.map(t=>`<option>${t}</option>`).join("");

    fTecnico.addEventListener("change", verTecnico);
}

/* VER TÉCNICO */
function verTecnico(){

    let t = fTecnico.value;

    let lista = dados.filter(d=>d.tecnico===t);

    let html = "";

    lista.sort((a,b)=>a.data.localeCompare(b.data));

    lista.forEach(d=>{
        html += `
        <div class="card">
            📅 ${d.data} - ${d.escola}
        </div>`;
    });

    document.getElementById("listaTecnico").innerHTML = html;
}

/* DASHBOARD */
function montarDashboard(){

    let total = dados.length;

    let preventiva = dados.filter(d=>d.tipo==="Preventiva").length;
    let corretiva = dados.filter(d=>d.tipo==="Corretiva").length;

    document.getElementById("indicadores").innerHTML = `
        <div class="box">Total de visitas: ${total}</div>
        <div class="box">Preventivas: ${preventiva}</div>
        <div class="box">Corretivas: ${corretiva}</div>
    `;
}

carregar();

</script>

</body>
</html>
