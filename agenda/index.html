<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel de Visitas Técnicas</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f1f5f9;}

nav{display:flex;background:#1e3a8a;color:white;}
nav button{flex:1;padding:15px;border:none;background:none;color:white;cursor:pointer;}
nav button.active{background:#2563eb;}

.container{padding:20px;}
.hidden{display:none;}

.card{
    background:white;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
}

.preventiva{border-left:5px solid green;}
.corretiva{border-left:5px solid red;}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.day{
    background:white;
    padding:10px;
    border-radius:8px;
    min-height:90px;
    cursor:pointer;
}

.day:hover{background:#e2e8f0;}

.header{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    text-align:center;
    font-weight:bold;
    margin-bottom:5px;
}

.box{background:white;padding:15px;border-radius:10px;margin-bottom:10px;}

</style>
</head>

<body>

<nav>
<button onclick="trocar('agenda')" class="active">📅 Agenda</button>
<button onclick="trocar('tecnico')">👨‍🔧 Técnico</button>
<button onclick="trocar('escola')">🏫 Escola</button>
<button onclick="trocar('dashboard')">📊 Dashboard</button>
</nav>

<div class="container">

<!-- AGENDA -->
<div id="agenda">
<h2>Calendário</h2>
<div class="header">
<div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
</div>
<div id="calendar" class="calendar"></div>
<div id="detalhes"></div>
</div>

<!-- TECNICO -->
<div id="tecnico" class="hidden">
<h2>Por Técnico</h2>
<select id="selTecnico"></select>
<div id="listaTec"></div>
</div>

<!-- ESCOLA -->
<div id="escola" class="hidden">
<h2>Por Escola</h2>
<select id="selEscola"></select>
<div id="listaEsc"></div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
<h2>Dashboard</h2>
<canvas id="grafTipo"></canvas>
<canvas id="grafTec"></canvas>
<canvas id="grafMun"></canvas>
</div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbzSnemMI0Rqo3GK67Dm4lwoOaep56hsm4pVqZ6AOeh64oGxSER3r4keZXcYjZmO59s/exec";
let dados=[];

/* TROCAR ABA */
function trocar(id){
document.querySelectorAll(".container > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

/* CARREGAR */
async function carregar(){
let r=await fetch(URL);
dados=await r.json();

montarCalendario();
popularFiltros();
dashboard();
}

/* CALENDÁRIO REAL */
function montarCalendario(){

let hoje=new Date();
let ano=hoje.getFullYear();
let mes=hoje.getMonth();

let primeiro=new Date(ano,mes,1).getDay();
let ultimo=new Date(ano,mes+1,0).getDate();

let mapa={};

dados.forEach(d=>{
mapa[d.data]=(mapa[d.data]||0)+1;
});

let html="";

/* espaços vazios */
for(let i=0;i<primeiro;i++) html+="<div></div>";

for(let d=1;d<=ultimo;d++){

let dataStr=`${ano}-${String(mes+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

html+=`
<div class="day" onclick="verDia('${dataStr}')">
<strong>${d}</strong><br>
${mapa[dataStr]?mapa[dataStr]+" visitas":""}
</div>`;
}

calendar.innerHTML=html;
}

/* DETALHE AGRUPADO POR MUNICIPIO */
function verDia(data){

let lista=dados.filter(x=>x.data===data);

let grupos={};

lista.forEach(d=>{
if(!grupos[d.municipio]) grupos[d.municipio]=[];
grupos[d.municipio].push(d);
});

let html=`<h3>${data}</h3>`;

Object.keys(grupos).forEach(m=>{
html+=`<h4>📍 ${m}</h4>`;

grupos[m].forEach(d=>{
html+=`
<div class="card ${d.tipo==='Preventiva'?'preventiva':'corretiva'}">
${d.escola} - ${d.tecnico}
</div>`;
});
});

detalhes.innerHTML=html;
}

/* FILTROS */
function popularFiltros(){

let tecnicos=[...new Set(dados.map(d=>d.tecnico))];
let escolas=[...new Set(dados.map(d=>d.escola))];

selTecnico.innerHTML=tecnicos.map(t=>`<option>${t}</option>`);
selEscola.innerHTML=escolas.map(e=>`<option>${e}</option>`);

selTecnico.onchange=verTec;
selEscola.onchange=verEsc;
}

/* TECNICO */
function verTec(){
let t=selTecnico.value;
let lista=dados.filter(d=>d.tecnico===t);

listaTec.innerHTML=lista.map(d=>`
<div class="card">
${d.data} - ${d.escola}
</div>`).join("");
}

/* ESCOLA */
function verEsc(){
let e=selEscola.value;
let lista=dados.filter(d=>d.escola===e);

listaEsc.innerHTML=lista.map(d=>`
<div class="card">
${d.data} - ${d.tecnico}
</div>`).join("");
}

/* DASHBOARD COM GRÁFICOS */
function dashboard(){

let tipo={Preventiva:0,Corretiva:0};
let tec={};
let mun={};

dados.forEach(d=>{
tipo[d.tipo]=(tipo[d.tipo]||0)+1;
tec[d.tecnico]=(tec[d.tecnico]||0)+1;
mun[d.municipio]=(mun[d.municipio]||0)+1;
});

new Chart(grafTipo,{
type:'pie',
data:{labels:Object.keys(tipo),datasets:[{data:Object.values(tipo)}]}
});

new Chart(grafTec,{
type:'bar',
data:{labels:Object.keys(tec),datasets:[{data:Object.values(tec)}]}
});

new Chart(grafMun,{
type:'bar',
data:{labels:Object.keys(mun),datasets:[{data:Object.values(mun)}]}
});

}

carregar();

</script>

</body>
</html>
