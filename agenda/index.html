<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitas Tech Pro | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #151c2c;
            --card-hover: #1c2539;
            --accent: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border: #232d42;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVEGAÇÃO --- */
        nav {
            background: rgba(11, 15, 26, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-container { display: flex; justify-content: center; gap: 1rem; max-width: 1200px; margin: 0 auto; }
        nav button {
            background: transparent; border: none; color: var(--text-secondary);
            padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 10px;
            font-weight: 600; transition: 0.3s; font-size: 0.9rem;
        }
        nav button.active { background: var(--accent); color: white; box-shadow: 0 4px 15px var(--accent-glow); }

        /* --- LAYOUT PRINCIPAL --- */
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
        
        /* KPIs */
        .kpis { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 1.5rem; margin-bottom: 2rem;
        }
        .kpi-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 1.5rem; border-radius: 20px;
            position: relative; overflow: hidden;
        }
        .kpi-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
            background: var(--accent);
        }
        .kpi-label { color: var(--text-secondary); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        .kpi-value { font-size: 2rem; font-weight: 800; margin-top: 0.5rem; display: block; }

        /* GRID CONTENT */
        .main-grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 1.5rem; }

        .card { 
            background: var(--card-bg); border: 1px solid var(--border); 
            border-radius: 24px; padding: 1.5rem;
        }

        /* CALENDÁRIO */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0.5rem; }
        .cal-day-name { text-align: center; color: var(--text-secondary); font-size: 0.7rem; font-weight: 700; padding-bottom: 0.5rem; }
        .day {
            aspect-ratio: 1; border-radius: 12px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 0.9rem; transition: 0.2s; position: relative;
        }
        .day:hover:not(.empty) { background: var(--card-hover); border-color: var(--accent); }
        .day.has-visit { border-color: var(--accent); color: var(--accent); font-weight: 800; background: rgba(59, 130, 246, 0.05); }
        .day.selected { background: var(--accent) !important; color: white !important; }
        .dot { position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--accent); border-radius: 50%; }

        /* LISTA DE VISITAS */
        .visit-item {
            background: var(--card-hover); border-radius: 16px; padding: 1.2rem; margin-bottom: 1rem;
            border: 1px solid var(--border); transition: 0.3s;
        }
        .visit-item:hover { transform: scale(1.02); border-color: var(--accent); }
        
        .badge {
            font-size: 0.65rem; padding: 0.3rem 0.7rem; border-radius: 8px; font-weight: 800; text-transform: uppercase;
        }
        .badge-type-prev { color: var(--success); background: rgba(16, 185, 129, 0.1); border: 1px solid var(--success); }
        .badge-type-corr { color: var(--danger); background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); }
        .badge-status { margin-left: 0.5rem; background: rgba(255,255,255,0.1); color: white; }

        /* CONTROLES */
        .controls { display: grid; grid-template-columns: 1fr 1fr auto; gap: 1rem; margin-bottom: 1.5rem; }
        select, input {
            background: var(--card-bg); border: 1px solid var(--border); color: white;
            padding: 0.8rem 1rem; border-radius: 12px; outline: none; width: 100%;
        }
        input:focus { border-color: var(--accent); }

        #loading {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } .controls { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    <p style="margin-top: 1rem; color: var(--text-secondary); font-weight: 600;">Sincronizando Dados...</p>
</div>

<nav>
    <div class="nav-container">
        <button class="active" onclick="switchTab('agenda', this)">RESUMO</button>
        <button onclick="switchTab('tecnico', this)">TÉCNICOS</button>
        <button onclick="switchTab('escola', this)">ESCOLAS</button>
    </div>
</nav>

<div class="container">
    <div class="kpis">
        <div class="kpi-card" style="--accent: var(--accent)">
            <span class="kpi-label">Total de Visitas</span>
            <span class="kpi-value" id="total-val">0</span>
        </div>
        <div class="kpi-card" style="--accent: var(--warning)">
            <span class="kpi-label">Agendadas</span>
            <span class="kpi-value" id="agend-val">0</span>
        </div>
        <div class="kpi-card" style="--accent: var(--success)">
            <span class="kpi-label">Concluídas</span>
            <span class="kpi-value" id="concl-val">0</span>
        </div>
        <div class="kpi-card" style="--accent: var(--danger)">
            <span class="kpi-label">Corretivas</span>
            <span class="kpi-value" id="corr-val">0</span>
        </div>
    </div>

    <section id="agenda" class="tab-content">
        <div class="main-grid">
            <div class="card">
                <div class="cal-header">
                    <button onclick="changeMonth(-1)" style="background:none; border:none; color:white; cursor:pointer;">❮</button>
                    <h2 id="monthLabel" style="margin:0; font-size:1.2rem;"></h2>
                    <button onclick="changeMonth(1)" style="background:none; border:none; color:white; cursor:pointer;">❯</button>
                </div>
                <div class="cal-grid" id="calendar"></div>
                <div id="dayDetail" style="margin-top: 2rem; display:none;">
                    <h3 id="detailDate" style="color: var(--accent); font-size: 1rem; margin-bottom: 1.5rem;"></h3>
                    <div id="dayList"></div>
                </div>
            </div>
            <div class="card">
                <h3 style="font-size:1rem; margin-bottom:1.5rem; color:var(--text-secondary)">Desempenho por Técnico</h3>
                <canvas id="mainChart" height="400"></canvas>
            </div>
        </div>
    </section>

    <section id="tecnico" class="tab-content" style="display:none">
        <div class="card">
            <div class="controls">
                <select id="filterTec"></select>
                <input type="text" id="searchEsc" placeholder="Buscar por escola...">
                <button onclick="window.print()" class="badge" style="cursor:pointer; background:var(--accent); color:var(--bg); border:none;">Relatório</button>
            </div>
            <div id="tecList"></div>
        </div>
    </section>

    <section id="escola" class="tab-content" style="display:none">
        <div class="card">
            <div class="controls" style="grid-template-columns: 1fr;">
                <select id="filterEsc"></select>
            </div>
            <div id="escHistory"></div>
        </div>
    </section>
</div>

<script>
// URL do seu script fornecido
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxbDpoifeIgJn7ciehq2WIMpPRt-8fYKL3LcrWRIqzz_RSUOwJwD5E_GEIpO-1rLKM/exec";

let db = [];
let currentDate = new Date();
let myChart = null;

async function init() {
    try {
        const response = await fetch(SHEET_URL);
        const data = await response.json();
        // Filtro crítico para limpar as 500 linhas da planilha
        db = data.filter(row => row.escola && row.escola.toString().trim() !== "");
        
        document.getElementById('loading').style.display = 'none';
        
        setupFilters();
        updateDashboard();
    } catch (e) {
        console.error("Erro ao carregar dados", e);
    }
}

function updateDashboard() {
    // KPIs
    document.getElementById('total-val').innerText = db.length;
    document.getElementById('agend-val').innerText = db.filter(r => r.status === 'Agendada').length;
    document.getElementById('concl-val').innerText = db.filter(r => r.status === 'Concluída').length;
    document.getElementById('corr-val').innerText = db.filter(r => r.tipo === 'Corretiva').length;

    renderCalendar();
    renderChart();
    renderTecList();
}

function setupFilters() {
    const tecs = [...new Set(db.map(r => r.tecnico))].sort();
    const escs = [...new Set(db.map(r => r.escola))].sort();

    const fTec = document.getElementById('filterTec');
    fTec.innerHTML = '<option value="">Todos os Técnicos</option>' + tecs.map(t => `<option>${t}</option>`).join('');
    fTec.onchange = renderTecList;

    const fEsc = document.getElementById('filterEsc');
    fEsc.innerHTML = '<option value="">Selecione uma Unidade Escolar</option>' + escs.map(e => `<option>${e}</option>`).join('');
    fEsc.onchange = renderEscHistory;

    document.getElementById('searchEsc').oninput = renderTecList;
}

function createItemUI(v) {
    const typeClass = v.tipo === 'Preventiva' ? 'badge-type-prev' : 'badge-type-corr';
    return `
        <div class="visit-item">
            <div style="display:flex; justify-content:space-between; align-items:start">
                <div>
                    <span style="font-weight:800; font-size:1rem; display:block;">${v.escola}</span>
                    <span style="color:var(--text-secondary); font-size:0.75rem;">📍 ${v.municipio} • 🆔 ${v.chamado || '---'}</span>
                </div>
                <div style="text-align:right">
                    <span class="badge ${typeClass}">${v.tipo}</span>
                    <span class="badge badge-status">${v.status}</span>
                </div>
            </div>
            <div style="margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border); display:flex; justify-content:space-between; font-size:0.8rem">
                <span>👨‍🔧 ${v.tecnico}</span>
                <span style="color:var(--text-secondary)">📅 ${v.data.split('-').reverse().join('/')}</span>
            </div>
            ${v.observacao ? `<div class="obs-tag">${v.observacao}</div>` : ''}
        </div>
    `;
}

function renderCalendar() {
    const cal = document.getElementById('calendar');
    cal.innerHTML = '';
    
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    document.getElementById('monthLabel').innerText = `${months[month]} ${year}`;

    const daysName = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
    daysName.forEach(d => cal.innerHTML += `<div class="cal-day-name">${d}</div>`);

    const firstDay = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) cal.innerHTML += '<div class="day empty"></div>';

    for (let d = 1; d <= lastDay; d++) {
        const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const hasVisits = db.filter(v => v.data === dStr);
        const dayEl = document.createElement('div');
        dayEl.className = `day ${hasVisits.length ? 'has-visit' : ''}`;
        dayEl.innerHTML = d + (hasVisits.length ? `<div class="dot"></div>` : '');
        dayEl.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
            dayEl.classList.add('selected');
            showDayDetails(dStr, hasVisits);
        };
        cal.appendChild(dayEl);
    }
}

function showDayDetails(date, list) {
    const container = document.getElementById('dayDetail');
    const listCont = document.getElementById('dayList');
    container.style.display = 'block';
    document.getElementById('detailDate').innerText = `VISITAS EM ${date.split('-').reverse().join('/')}`;
    listCont.innerHTML = list.length ? list.map(createItemUI).join('') : '<p style="color:var(--text-secondary)">Nenhuma visita para este dia.</p>';
}

function renderTecList() {
    const tec = document.getElementById('filterTec').value;
    const search = document.getElementById('searchEsc').value.toLowerCase();
    const list = db.filter(r => (!tec || r.tecnico === tec) && r.escola.toLowerCase().includes(search));
    document.getElementById('tecList').innerHTML = list.map(createItemUI).join('');
}

function renderEscHistory() {
    const esc = document.getElementById('filterEsc').value;
    const list = db.filter(r => r.escola === esc);
    document.getElementById('escHistory').innerHTML = list.map(createItemUI).join('');
}

function renderChart() {
    const ctx = document.getElementById('mainChart').getContext('2d');
    if(myChart) myChart.destroy();

    const tecs = [...new Set(db.map(r => r.tecnico))];
    const datasets = {
        concluidas: tecs.map(t => db.filter(r => r.tecnico === t && r.status === 'Concluída').length),
        agendadas: tecs.map(t => db.filter(r => r.tecnico === t && r.status === 'Agendada').length)
    };

    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: tecs,
            datasets: [
                { label: 'Concluídas', data: datasets.concluidas, backgroundColor: '#10b981' },
                { label: 'Agendadas', data: datasets.agendadas, backgroundColor: '#3b82f6' }
            ]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { stacked: true, grid: { color: '#232d42' }, ticks: { color: '#94a3b8' } },
                y: { stacked: true, grid: { display: false }, ticks: { color: '#94a3b8' } }
            },
            plugins: { legend: { labels: { color: '#94a3b8', font: { family: 'Plus Jakarta Sans', weight: 'bold' } } } }
        }
    });
}

function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
}

function changeMonth(dir) {
    currentDate.setMonth(currentDate.getMonth() + dir);
    renderCalendar();
}

init();
</script>
</body>
</html>
