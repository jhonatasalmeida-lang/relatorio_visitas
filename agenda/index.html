<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitas Tech Pro v8.0 | Enterprise</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(22, 28, 45, 0.7);
            --accent: #3b82f6;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --purple: #8b5cf6;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            margin: 0; background-color: var(--bg); color: var(--text-main); 
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #05070a 60%);
            min-height: 100vh; width: 100%;
        }

        /* NAVBAR 100% */
        nav {
            background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); padding: 1rem 2rem;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .nav-links { display: flex; gap: 12px; }
        nav button {
            background: transparent; border: 1px solid transparent; color: var(--text-dim);
            padding: 0.7rem 1.5rem; cursor: pointer; border-radius: 12px;
            font-weight: 700; transition: 0.4s; font-size: 0.85rem;
        }
        nav button.active { background: var(--accent); color: white; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

        .container-fluid { width: 100%; padding: 2rem; }

        /* KPIS - 5 CARDS */
        .kpi-grid { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 1.5rem; margin-bottom: 2rem;
        }
        .kpi-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 1.5rem; border-radius: 24px; border-top: 4px solid var(--accent);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); backdrop-filter: blur(10px);
        }
        .kpi-label { color: var(--text-dim); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .kpi-value { font-size: 2.2rem; font-weight: 800; display: block; margin-top: 8px; }

        /* DASHBOARD LAYOUT */
        .main-grid { display: grid; grid-template-columns: 1fr 450px; gap: 1.5rem; }
        .glass-panel {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 28px; padding: 2rem; backdrop-filter: blur(10px);
        }

        /* CALENDÁRIO */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day {
            aspect-ratio: 1; border-radius: 16px; border: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            cursor: pointer; position: relative; transition: 0.3s; background: rgba(255,255,255,0.02);
        }
        .day:hover:not(.empty) { background: rgba(59, 130, 246, 0.1); border-color: var(--accent); }
        .day.selected { background: var(--accent) !important; color: white !important; }
        .visit-badge {
            position: absolute; top: 8px; right: 8px; background: var(--accent);
            color: white; font-size: 10px; font-weight: 800; min-width: 18px; height: 18px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* CARDS DE VISITA DETALHADOS */
        .visit-item {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 20px; padding: 1.5rem; margin-bottom: 1rem;
            border-left: 6px solid #444; transition: 0.3s;
        }
        .visit-item.Preventiva { border-left-color: var(--purple); }
        .visit-item.Corretiva { border-left-color: var(--danger); }
        
        .status-tag {
            padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; border: 1px solid currentColor;
        }
        .st-agendada { color: var(--warning); }
        .st-concluida { color: var(--success); }

        /* FILTROS */
        .filter-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 15px; margin-bottom: 2rem; }
        select, input {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: white;
            padding: 1rem; border-radius: 15px; outline: none;
        }

        #loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div id="loader">
    <div style="width: 50px; height: 50px; border: 4px solid #222; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
    <p style="margin-top: 20px; font-weight: 800; letter-spacing: 2px;">RECONECTANDO...</p>
</div>

<nav>
    <div class="nav-content">
        <div style="font-weight: 800; font-size: 1.2rem; color: var(--accent);">V-TECH <span style="color:white">PRO</span></div>
        <div class="nav-links">
            <button class="active" onclick="tab('agenda', this)">CALENDÁRIO</button>
            <button onclick="tab('tecnico', this)">TÉCNICOS</button>
            <button onclick="tab('escola', this)">ESCOLAS</button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="kpi-grid">
        <div class="kpi-card" style="border-top-color: var(--accent)"><span class="kpi-label">Total</span><span class="kpi-value" id="k-tot">0</span></div>
        <div class="kpi-card" style="border-top-color: var(--warning)"><span class="kpi-label">Agendadas</span><span class="kpi-value" id="k-age" style="color:var(--warning)">0</span></div>
        <div class="kpi-card" style="border-top-color: var(--success)"><span class="kpi-label">Concluídas</span><span class="kpi-value" id="k-con" style="color:var(--success)">0</span></div>
        <div class="kpi-card" style="border-top-color: var(--purple)"><span class="kpi-label">Preventivas</span><span class="kpi-value" id="k-pre" style="color:var(--purple)">0</span></div>
        <div class="kpi-card" style="border-top-color: var(--danger)"><span class="kpi-label">Corretivas</span><span class="kpi-value" id="k-cor" style="color:var(--danger)">0</span></div>
    </div>

    <section id="agenda" class="tabs">
        <div class="main-grid">
            <div class="glass-panel">
                <div class="cal-header">
                    <button onclick="moveMonth(-1)" style="color:white; background:none; border:none; cursor:pointer; font-size:1.5rem">❮</button>
                    <h2 id="mLabel" style="margin:0; text-transform:uppercase"></h2>
                    <button onclick="moveMonth(1)" style="color:white; background:none; border:none; cursor:pointer; font-size:1.5rem">❯</button>
                </div>
                <div class="cal-grid" id="calendar"></div>
            </div>
            <div class="glass-panel">
                <h3 id="dTitle" style="margin:0 0 1.5rem 0; font-size:1rem; color:var(--text-dim)">DETALHES DO DIA</h3>
                <div id="dList"></div>
            </div>
        </div>
    </section>

    <section id="tecnico" class="tabs" style="display:none">
        <div class="glass-panel">
            <div class="filter-row">
                <select id="sTec"></select>
                <input type="text" id="iBusca" placeholder="Buscar unidade escolar...">
                <button onclick="window.print()" style="background:#fff; color:#000; border:none; padding:0 20px; border-radius:12px; font-weight:800; cursor:pointer">PDF</button>
            </div>
            <div id="tList"></div>
            <div style="height:350px; margin-top:3rem"><canvas id="chartTec"></canvas></div>
        </div>
    </section>

    <section id="escola" class="tabs" style="display:none">
        <div class="glass-panel">
            <select id="sEsc" style="width:100%; margin-bottom:2rem"></select>
            <div id="eHist"></div>
        </div>
    </section>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxbDpoifeIgJn7ciehq2WIMpPRt-8fYKL3LcrWRIqzz_RSUOwJwD5E_GEIpO-1rLKM/exec";

let db = [];
let viewDate = new Date();
let myChart = null;

async function init() {
    try {
        const res = await fetch(URL);
        const data = await res.json();
        db = data.filter(r => r.escola && r.escola.toString().trim() !== "");
        document.getElementById('loader').style.display = 'none';
        setupFilters();
        refresh();
    } catch(e) {
        document.getElementById('loader').innerHTML = "Erro ao carregar dados da planilha.";
    }
}

function refresh() {
    // KPIs
    document.getElementById('k-tot').innerText = db.length;
    document.getElementById('k-age').innerText = db.filter(r => r.status === 'Agendada').length;
    document.getElementById('k-con').innerText = db.filter(r => r.status === 'Concluída').length;
    document.getElementById('k-pre').innerText = db.filter(r => r.tipo === 'Preventiva').length;
    document.getElementById('k-cor').innerText = db.filter(r => r.tipo === 'Corretiva').length;

    renderCal();
    renderTec();
    renderChart();
}

function renderCal() {
    const grid = document.getElementById('calendar'); grid.innerHTML = '';
    const y = viewDate.getFullYear(), m = viewDate.getMonth();
    const months = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    document.getElementById('mLabel').innerText = `${months[m]} ${y}`;

    const first = new Date(y, m, 1).getDay();
    const last = new Date(y, m+1, 0).getDate();

    for(let i=0; i<first; i++) grid.innerHTML += '<div class="day empty" style="border:none; background:none"></div>';

    for(let d=1; d<=last; d++) {
        const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const visits = db.filter(v => v.data === dStr);
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        dayEl.innerHTML = `<b>${d}</b>`;
        if(visits.length > 0) dayEl.innerHTML += `<div class="visit-badge">${visits.length}</div>`;
        dayEl.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
            dayEl.classList.add('selected');
            showDay(dStr, visits);
        };
        grid.appendChild(dayEl);
    }
}

function showDay(date, list) {
    document.getElementById('dTitle').innerText = `VISITAS EM ${date.split('-').reverse().join('/')}`;
    document.getElementById('dList').innerHTML = list.length ? list.map(itemTemplate).join('') : '<p>Sem visitas.</p>';
}

function itemTemplate(v) {
    return `
        <div class="visit-item ${v.tipo}">
            <div style="display:flex; justify-content:space-between; align-items:start">
                <div>
                    <div style="font-weight:800; font-size:1.1rem">${v.escola}</div>
                    <div style="color:var(--text-dim); font-size:0.8rem; margin-top:4px">📍 ${v.municipio}</div>
                </div>
                <span class="status-tag ${v.status === 'Agendada' ? 'st-agendada' : 'st-concluida'}">${v.status}</span>
            </div>
            <div style="margin-top:1.2rem; display:flex; justify-content:space-between; font-size:0.8rem; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px">
                <span style="color:var(--accent); font-weight:700">👨‍🔧 ${v.tecnico}</span>
                <span style="font-weight:700; color:var(--text-dim)">${v.tipo}</span>
            </div>
            ${v.observacao ? `<div style="margin-top:10px; font-size:0.75rem; color:var(--text-dim); font-style:italic">💬 ${v.observacao}</div>` : ''}
        </div>
    `;
}

function renderChart() {
    const ctx = document.getElementById('chartTec').getContext('2d');
    if(myChart) myChart.destroy();
    const tecs = [...new Set(db.map(r => r.tecnico))].filter(t => t);
    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: tecs,
            datasets: [
                { label: 'Concluídas', data: tecs.map(t => db.filter(r => r.tecnico === t && r.status === 'Concluída').length), backgroundColor: '#10b981' },
                { label: 'Agendadas', data: tecs.map(t => db.filter(r => r.tecnico === t && r.status === 'Agendada').length), backgroundColor: '#3b82f6' }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#94a3b8', font: { weight: 'bold' } } } },
            scales: {
                x: { ticks: { color: '#94a3b8' }, grid: { display: false } },
                y: { ticks: { color: '#94a3b8' }, grid: { color: 'rgba(255,255,255,0.05)' } }
            }
        }
    });
}

function setupFilters() {
    const tecs = [...new Set(db.map(r => r.tecnico))].filter(t => t).sort();
    const escs = [...new Set(db.map(r => r.escola))].filter(e => e).sort();
    document.getElementById('sTec').innerHTML = '<option value="">Todos Técnicos</option>' + tecs.map(t => `<option>${t}</option>`).join('');
    document.getElementById('sEsc').innerHTML = '<option value="">Selecionar Escola...</option>' + escs.map(e => `<option>${e}</option>`).join('');
    document.getElementById('sTec').onchange = renderTec;
    document.getElementById('iBusca').oninput = renderTec;
    document.getElementById('sEsc').onchange = renderEsc;
}

function renderTec() {
    const t = document.getElementById('sTec').value, b = document.getElementById('iBusca').value.toLowerCase();
    const l = db.filter(r => (!t || r.tecnico === t) && r.escola.toLowerCase().includes(b));
    document.getElementById('tList').innerHTML = l.map(itemTemplate).join('');
}

function renderEsc() {
    const e = document.getElementById('sEsc').value;
    const l = db.filter(r => r.escola === e);
    document.getElementById('eHist').innerHTML = l.map(itemTemplate).join('');
}

function tab(id, b) {
    document.querySelectorAll('.tabs').forEach(t => t.style.display = 'none');
    document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    b.classList.add('active');
}

function moveMonth(n) { viewDate.setMonth(viewDate.getMonth() + n); renderCal(); }

init();
</script>
<style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
