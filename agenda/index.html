<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Profissional</title>

<style>
body{margin:0;font-family:Arial;background:#f1f5f9}
nav{display:flex;background:#0f172a}
nav button{flex:1;padding:14px;border:none;background:none;color:#cbd5f5;cursor:pointer}
nav button.active{background:#1d4ed8;color:white;font-weight:bold}
.container{padding:20px}
.hidden{display:none}

.card{background:#fff;border-radius:12px;padding:12px;margin:10px 0;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.top{display:flex;justify-content:space-between}
.badge{padding:3px 8px;border-radius:6px;color:#fff;font-size:12px}
.preventiva{background:#16a34a}
.corretiva{background:#dc2626}
.info{font-size:14px;margin-top:6px}
.obs{font-size:13px;color:#475569;margin-top:6px}

select,input{padding:10px;border-radius:8px;border:1px solid #ccc;margin-bottom:10px}

/* PAGINAÇÃO */
.paginacao{display:flex;gap:5px;margin-top:10px}
.paginacao button{padding:6px 10px;border:none;background:#e2e8f0;cursor:pointer;border-radius:6px}
.paginacao button.active{background:#2563eb;color:#fff}

</style>
</head>

<body>

<nav>
<button onclick="trocar('agenda',this)" class="active">Agenda</button>
<button onclick="trocar('tecnico',this)">Técnico</button>
<button onclick="trocar('escola',this)">Escola</button>
</nav>

<div class="container">

<div id="agenda">
<h2>Agenda</h2>
<div id="listaAgenda"></div>
</div>

<div id="tecnico" class="hidden">
<h2>Técnico</h2>
<select id="selTecnico"></select>
<input type="text" id="buscaTec" placeholder="Buscar escola...">
<div id="listaTec"></div>
<div id="paginacaoTec" class="paginacao"></div>
</div>

<div id="escola" class="hidden">
<h2>Escola</h2>
<select id="selEscola"></select>
<div id="listaEsc"></div>
</div>

</div>

<script>
const URL="https://script.google.com/macros/s/AKfycbzSnemMI0Rqo3GK67Dm4lwoOaep56hsm4pVqZ6AOeh64oGxSER3r4keZXcYjZmO59s/exec";
let dados=[];
let pagina=1;
const porPagina=8;

function trocar(id,el){
document.querySelectorAll('.container > div').forEach(d=>d.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
el.classList.add('active');
}

async function carregar(){
let r=await fetch(URL);
dados=await r.json();
popularFiltros();
renderAgenda();
verTec();
verEsc();
}

function card(d){
return `
<div class="card">
<div class="top">
<strong>${d.escola}</strong>
<span class="badge ${d.tipo==='Preventiva'?'preventiva':'corretiva'}">${d.tipo}</span>
</div>
<div class="info">
📅 ${d.data}<br>
👨‍🔧 ${d.tecnico}<br>
📍 ${d.municipio}<br>
🆔 ${d.chamado||'-'}
</div>
<div class="obs">📝 ${d.observacao||'Sem observação'}</div>
</div>`;
}

function renderAgenda(){
listaAgenda.innerHTML=dados.slice(0,20).map(card).join('');
}

function popularFiltros(){
let tecnicos=[...new Set(dados.map(d=>d.tecnico))];
let escolas=[...new Set(dados.map(d=>d.escola))];

selTecnico.innerHTML=tecnicos.map(t=>`<option>${t}</option>`).join('');
selEscola.innerHTML=escolas.map(e=>`<option>${e}</option>`).join('');

selTecnico.onchange=()=>{pagina=1;verTec()};
buscaTec.oninput=()=>{pagina=1;verTec()};
selEscola.onchange=verEsc;
}

function verTec(){
let t=selTecnico.value;
let busca=buscaTec.value.toLowerCase();

let filtrado=dados.filter(d=>
d.tecnico===t && d.escola.toLowerCase().includes(busca)
);

let totalPaginas=Math.ceil(filtrado.length/porPagina);
let inicio=(pagina-1)*porPagina;
let fim=inicio+porPagina;

listaTec.innerHTML=filtrado.slice(inicio,fim).map(card).join('');

renderPaginacao(totalPaginas);
}

function renderPaginacao(total){
let html='';
for(let i=1;i<=total;i++){
html+=`<button onclick="pagina=${i};verTec()" class="${i===pagina?'active':''}">${i}</button>`;
}
paginacaoTec.innerHTML=html;
}

function verEsc(){
let e=selEscola.value;
let lista=dados.filter(d=>d.escola===e);

listaEsc.innerHTML=lista
.sort((a,b)=>a.data.localeCompare(b.data))
.map(card).join('');
}

carregar();
</script>

</body>
</html>
