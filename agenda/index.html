<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Visitas v7.0 | High Performance</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --card: rgba(22, 28, 45, 0.7);
            --accent: #3b82f6;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --purple: #8b5cf6;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #05070a 60%);
            min-height: 100vh; width: 100%; overflow-x: hidden;
        }

        /* FULL WIDTH LAYOUT */
        nav {
            background: rgba(5, 7, 10, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.1); padding: 1rem 2rem;
            position: sticky; top: 0; z-index: 1000;
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        .nav-btns { display: flex; gap: 10px; }
        nav button {
            background: transparent; border: 1px solid transparent; color: var(--text-dim);
            padding: 0.6rem 1.2rem; cursor: pointer; border-radius: 10px; font-weight: 700; transition: 0.3s;
        }
        nav button.active { background: var(--accent); color: white; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

        .content { width: 100%; padding: 1.5rem; }

        /* KPIs 5 COLUNAS */
        .kpi-row { 
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 1rem; margin-bottom: 1.5rem; 
        }
        .kpi-card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.05);
            padding: 1.2rem; border-radius: 20px; border-top: 3px solid var(--accent);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .kpi-label { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .kpi-val { font-size: 1.8rem; font-weight: 800; display: block; margin-top: 5px; }

        /* MAIN GRID */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 400px; gap: 1.5rem; width: 100%; }
        .panel { background: var(--card); border-radius: 24px; padding: 1.5rem; border: 1px solid rgba(255,255,255,0.05); }

        /* CALENDÁRIO */
        .cal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day {
            aspect-ratio: 1; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; position: relative; background: rgba(255,255,255,0.02); font-weight: 600;
        }
        .day:hover:not(.empty) { background: rgba(59, 130, 246, 0.1); border-color: var(--accent); }
        .day.has-v { color: var(--accent); border-color: var(--accent); }
        .day.selected { background: var(--accent) !important; color: white !important; }
        .count-badge {
            position: absolute; top: 5px; right: 5px; background: var(--accent);
            color: white; font-size: 9px; min-width: 16px; height: 16px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }

        /* VISIT CARD */
        .visit-card {
            background: rgba(255,255,255,0.03); border-radius: 15px; padding: 1rem; margin-bottom: 10px;
            border-left: 4px solid #444; border-top: 1px solid rgba(255,255,255,0.05);
        }
        .v-prev { border-left-color: var(--purple); }
        .v-corr { border-left-color: var(--danger); }
        .status-pill { font-size: 9px; padding: 3px 7px; border-radius: 5px; font-weight: 800; text-transform: uppercase; border: 1px solid currentColor; }

        #loader { 
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        @media (max-width: 1000px) { .dashboard-grid { grid-template-columns: 1fr; } .kpi-row { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

<div id="loader">
    <div style="width:40px; height:40px; border:4px solid #222; border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite"></div>
    <p style="margin-top:15px; font-weight:600; font-size:0.8rem; letter-spacing:2px">SINCRO DE DADOS...</p>
</div>

<nav>
    <div class="nav-container">
        <div style="font-weight:900; color:var(--accent)">TECH<span style="color:#fff">VISIT</span></div>
        <div class="nav-btns">
            <button class="active" onclick="tab('agenda', this)">CALENDÁRIO</button>
            <button onclick="tab('tecnico', this)">TÉCNICOS</button>
            <button onclick="tab('escola', this)">ESCOLAS</button>
        </div>
    </div>
</nav>

<div class="content">
    <div class="kpi-row">
        <div class="kpi-card" style="border-top-color: var(--accent)"><span class="kpi-label">Total</span><span class="kpi-val" id="k-tot">0</span></div>
        <div class="kpi-card" style="border-top-color: var(--warning)"><span class="kpi-label">Agendadas</span><span class="kpi-val" id="k-age" style="color:var(--warning)">0</span></div>
        <div class="kpi-card" style="border-top-color: var(--success)"><span class="kpi-label">Concluídas</span><span class="kpi-val" id="k-con" style="color:var(--success)">0</span></div>
        <div class="kpi-card" style="border-top-color: var(--purple)"><span class="kpi-label">Preventivas</span><span class="kpi-val" id="k-pre" style="color:var(--purple)">0</span></div>
        <div class="kpi-card" style="border-top-color: var(--danger)"><span class="kpi-label">Corretivas</span><span class="kpi-val" id="k-cor" style="color:var(--danger)">0</span></div>
    </div>

    <section id="agenda" class="tabs">
        <div class="dashboard-grid">
            <div class="panel">
                <div class="cal-head">
                    <button onclick="moveMonth(-1)" style="color:#fff; background:none; border:none; cursor:pointer">❮</button>
                    <h3 id="mName" style="margin:0; text-transform:uppercase; font-size:1rem"></h3>
                    <button onclick="moveMonth(1)" style="color:#fff; background:none; border:none; cursor:pointer">❯</button>
                </div>
                <div class="cal-grid" id="cal"></div>
            </div>
            <div class="panel">
                <h4 id="detDate" style="margin:0 0 1rem 0; color:var(--text-dim); font-size:0.8rem">SELECIONE UM DIA</h4>
                <div id="detList"></div>
            </div>
        </div>
    </section>

    <section id="tecnico" class="tabs" style="display:none">
        <div class="panel">
            <div style="display:flex; gap:10px; margin-bottom:20px">
                <select id="sTec" style="flex:1; background:#111; color:#fff; border:1px solid #333; padding:10px; border-radius:10px"></select>
                <input type="text" id="iBusca" placeholder="Buscar escola..." style="flex:1; background:#111; color:#fff; border:1px solid #333; padding:10px; border-radius:10px">
            </div>
            <div id="tList"></div>
            <div style="height:300px; margin-top:2rem"><canvas id="tChart"></canvas></div>
        </div>
    </section>

    <section id="escola" class="tabs" style="display:none">
        <div class="panel">
            <select id="sEsc" style="width:100%; background:#111; color:#fff; border:1px solid #333; padding:10px; border-radius:10px; margin-bottom:20px"></select>
            <div id="eHist"></div>
        </div>
    </section>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxbDpoifeIgJn7ciehq2WIMpPRt-8fYKL3LcrWRIqzz_RSUOwJwD5E_GEIpO-1rLKM/exec";

let db = [];
let curDate = new Date();
let chart = null;

async function load() {
    try {
        const r = await fetch(URL);
        const d = await r.json();
        // Filtro robusto para ignorar as 500 linhas vazias
        db = d.filter(x => x.escola && x.escola.toString().trim() !== "");
        document.getElementById('loader').style.display = 'none';
        initFilters();
        update();
    } catch (e) {
        document.getElementById('loader').innerHTML = "<p>Erro na Planilha. Verifique as datas.</p>";
    }
}

function update() {
    document.getElementById('k-tot').innerText = db.length;
    document.getElementById('k-age').innerText = db.filter(x => x.status === 'Agendada').length;
    document.getElementById('k-con').innerText = db.filter(x => x.status === 'Concluída').length;
    document.getElementById('k-pre').innerText = db.filter(x => x.tipo === 'Preventiva').length;
    document.getElementById('k-cor').innerText = db.filter(x => x.tipo === 'Corretiva').length;
    renderCal();
    renderChart();
    renderTec();
}

function renderCal() {
    const g = document.getElementById('cal'); g.innerHTML = '';
    const y = curDate.getFullYear(), m = curDate.getMonth();
    const months = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
    document.getElementById('mName').innerText = `${months[m]} ${y}`;

    const first = new Date(y, m, 1).getDay();
    const last = new Date(y, m+1, 0).getDate();

    for(let i=0; i<first; i++) g.innerHTML += '<div class="day empty" style="border:none; background:none"></div>';
    
    for(let d=1; d<=last; d++) {
        const dStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const vits = db.filter(x => x.data === dStr);
        const dayEl = document.createElement('div');
        dayEl.className = `day ${vits.length ? 'has-v' : ''}`;
        dayEl.innerHTML = d + (vits.length ? `<div class="count-badge">${vits.length}</div>` : '');
        dayEl.onclick = () => {
            document.querySelectorAll('.day').forEach(e => e.classList.remove('selected'));
            dayEl.classList.add('selected');
            showDay(dStr, vits);
        };
        g.appendChild(dayEl);
    }
}

function showDay(date, list) {
    document.getElementById('detDate').innerText = `VISITAS EM ${date.split('-').reverse().join('/')}`;
    document.getElementById('detList').innerHTML = list.map(v => `
        <div class="visit-card ${v.tipo === 'Preventiva' ? 'v-prev' : 'v-corr'}">
            <div style="display:flex; justify-content:space-between">
                <b style="font-size:0.9rem">${v.escola}</b>
                <span class="status-pill" style="color:${v.status === 'Agendada' ? 'var(--warning)' : 'var(--success)'}">${v.status}</span>
            </div>
            <div style="margin-top:8px; font-size:0.75rem; color:var(--text-dim)">👨‍🔧 ${v.tecnico} | ${v.tipo}</div>
        </div>
    `).join('') || '<p>Sem registros.</p>';
}

function renderChart() {
    const c = document.getElementById('tChart'); if(!c) return;
    if(chart) chart.destroy();
    const tks = [...new Set(db.map(x => x.tecnico))].filter(t => t);
    chart = new Chart(c, {
        type: 'bar',
        data: {
            labels: tks,
            datasets: [
                { label: 'Concluída', data: tks.map(t => db.filter(x => x.tecnico === t && x.status === 'Concluída').length), backgroundColor: '#10b981' },
                { label: 'Agendada', data: tks.map(t => db.filter(x => x.tecnico === t && x.status === 'Agendada').length), backgroundColor: '#3b82f6' }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#94a3b8' } } }, scales: { x: { ticks: { color: '#94a3b8' } }, y: { ticks: { color: '#94a3b8' } } } }
    });
}

function initFilters() {
    const tks = [...new Set(db.map(x => x.tecnico))].filter(t => t).sort();
    const ecs = [...new Set(db.map(x => x.escola))].filter(e => e).sort();
    document.getElementById('sTec').innerHTML = '<option value="">Todos Técnicos</option>' + tks.map(t => `<option>${t}</option>`).join('');
    document.getElementById('sEsc').innerHTML = '<option value="">Selecionar Escola...</option>' + ecs.map(e => `<option>${e}</option>`).join('');
    document.getElementById('sTec').onchange = renderTec;
    document.getElementById('iBusca').oninput = renderTec;
    document.getElementById('sEsc').onchange = renderEsc;
}

function renderTec() {
    const t = document.getElementById('sTec').value, b = document.getElementById('iBusca').value.toLowerCase();
    const l = db.filter(x => (!t || x.tecnico === t) && x.escola.toLowerCase().includes(b));
    document.getElementById('tList').innerHTML = l.slice(0, 10).map(x => `<div style="padding:10px; border-bottom:1px solid #222; font-size:0.8rem">${x.escola} - ${x.status}</div>`).join('');
}

function renderEsc() {
    const e = document.getElementById('sEsc').value;
    const l = db.filter(x => x.escola === e);
    document.getElementById('eHist').innerHTML = l.map(x => `<div style="padding:10px; border-bottom:1px solid #222">${x.data} - ${x.tipo} - ${x.status}</div>`).join('');
}

function tab(id, b) {
    document.querySelectorAll('.tabs').forEach(t => t.style.display = 'none');
    document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    b.classList.add('active');
}

function moveMonth(n) { curDate.setMonth(curDate.getMonth() + n); renderCal(); }

window.onload = load;
</script>
<style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
