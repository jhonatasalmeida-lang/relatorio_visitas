<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitas Tech Pro | v5.1 Fix</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #151c2c;
            --accent: #3b82f6;
            --border: #232d42;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { margin: 0; background-color: var(--bg); color: var(--text-primary); }
        .hidden { display: none !important; }

        /* NAVEGAÇÃO */
        nav {
            background: rgba(11, 15, 26, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-container { display: flex; justify-content: center; gap: 10px; }
        nav button {
            background: transparent; border: none; color: var(--text-secondary);
            padding: 0.6rem 1.5rem; cursor: pointer; border-radius: 12px;
            font-weight: 600; transition: 0.3s;
        }
        nav button.active { background: var(--accent); color: white; }

        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }

        /* KPIS */
        .kpis { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; margin-bottom: 2rem;
        }
        .kpi-card {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 1.5rem; border-radius: 20px; border-left: 4px solid var(--accent);
        }
        .kpi-label { color: var(--text-secondary); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .kpi-value { font-size: 1.8rem; font-weight: 800; display: block; margin-top: 5px; }

        /* GRID */
        .main-grid { display: grid; grid-template-columns: 1.8fr 1.2fr; gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 24px; padding: 1.5rem; }

        /* CALENDÁRIO */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day {
            aspect-ratio: 1; border-radius: 10px; border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            font-size: 0.85rem; transition: 0.2s; position: relative;
        }
        .day:hover:not(.empty) { background: #1c2539; border-color: var(--accent); }
        .day.has-visit { color: var(--accent); font-weight: 800; background: rgba(59, 130, 246, 0.1); }
        .day.selected { background: var(--accent) !important; color: white !important; }

        /* LISTA */
        .visit-item {
            background: #1c2539; border-radius: 15px; padding: 1.2rem; margin-bottom: 1rem;
            border: 1px solid var(--border); border-left: 4px solid #64748b;
        }
        .visit-item.Preventiva { border-left-color: var(--success); }
        .visit-item.Corretiva { border-left-color: var(--danger); }
        
        .badge { font-size: 0.6rem; padding: 3px 8px; border-radius: 6px; font-weight: 800; text-transform: uppercase; border: 1px solid currentColor; }
        .st-agendada { color: var(--warning); }
        .st-concluida { color: var(--success); }

        /* FILTROS */
        .controls { display: grid; grid-template-columns: 1fr 1.5fr auto; gap: 10px; margin-bottom: 1.5rem; }
        select, input {
            background: var(--card-bg); border: 1px solid var(--border); color: white;
            padding: 0.8rem; border-radius: 10px; outline: none;
        }

        #loading {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000;
            display: flex; align-items: center; justify-content: center; color: var(--accent); font-weight: 800;
        }

        @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } .controls { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div id="loading">CARREGANDO...</div>

<nav>
    <div class="nav-container">
        <button class="active" onclick="switchTab('agenda', this)">RESUMO</button>
        <button onclick="switchTab('tecnico', this)">TÉCNICOS</button>
        <button onclick="switchTab('escola', this)">ESCOLAS</button>
    </div>
</nav>

<div class="container">
    <div class="kpis">
        <div class="kpi-card" style="border-color: var(--accent)">
            <span class="kpi-label">Total</span>
            <span class="kpi-value" id="total-val">0</span>
        </div>
        <div class="kpi-card" style="border-color: var(--warning)">
            <span class="kpi-label">Agendadas</span>
            <span class="kpi-value" id="agend-val">0</span>
        </div>
        <div class="kpi-card" style="border-color: var(--success)">
            <span class="kpi-label">Concluídas</span>
            <span class="kpi-value" id="concl-val">0</span>
        </div>
        <div class="kpi-card" style="border-color: var(--danger)">
            <span class="kpi-label">Corretivas</span>
            <span class="kpi-value" id="corr-val">0</span>
        </div>
    </div>

    <section id="agenda" class="tab-content">
        <div class="main-grid">
            <div class="card">
                <div class="cal-header">
                    <button onclick="changeMonth(-1)" style="color:white; background:none; border:none; cursor:pointer">❮</button>
                    <h3 id="monthLabel" style="margin:0"></h3>
                    <button onclick="changeMonth(1)" style="color:white; background:none; border:none; cursor:pointer">❯</button>
                </div>
                <div class="cal-grid" id="calendar"></div>
                <div id="dayDetail" style="margin-top: 2rem; display:none;">
                    <div id="dayList"></div>
                </div>
            </div>
            <div class="card">
                <h4 style="margin:0 0 1rem 0; color:var(--text-secondary)">Produtividade</h4>
                <div style="height: 300px; position: relative;">
                    <canvas id="mainChart"></canvas>
                </div>
            </div>
        </div>
    </section>

    <section id="tecnico" class="tab-content" style="display:none">
        <div class="card">
            <div class="controls">
                <select id="filterTec"></select>
                <input type="text" id="searchEsc" placeholder="Buscar escola...">
                <button onclick="window.print()" style="background:var(--accent); color:white; border:none; border-radius:10px; padding:0 1rem; cursor:pointer">Imprimir</button>
            </div>
            <div id="tecList"></div>
        </div>
    </section>

    <section id="escola" class="tab-content" style="display:none">
        <div class="card">
            <select id="filterEsc" style="margin-bottom: 1.5rem;"></select>
            <div id="escHistory"></div>
        </div>
    </section>
</div>

<script>
const SHEET_URL = "https://script.google.com/macros/s/AKfycbxbDpoifeIgJn7ciehq2WIMpPRt-8fYKL3LcrWRIqzz_RSUOwJwD5E_GEIpO-1rLKM/exec";

let db = [];
let currentDate = new Date();
let myChart = null;

async function init() {
    try {
        const response = await fetch(SHEET_URL);
        const data = await response.json();
        
        // FILTRO DE SEGURANÇA: Remove linhas vazias e garante que o nome do técnico exista
        db = data.filter(row => row.escola && row.escola.toString().trim() !== "" && row.tecnico);
        
        document.getElementById('loading').style.display = 'none';
        setupFilters();
        updateDashboard();
    } catch (e) {
        document.getElementById('loading').innerText = "Erro ao carregar dados.";
    }
}

function updateDashboard() {
    document.getElementById('total-val').innerText = db.length;
    document.getElementById('agend-val').innerText = db.filter(r => r.status === 'Agendada').length;
    document.getElementById('concl-val').innerText = db.filter(r => r.status === 'Concluída').length;
    document.getElementById('corr-val').innerText = db.filter(r => r.tipo === 'Corretiva').length;

    renderCalendar();
    renderChart();
    renderTecList();
}

function renderChart() {
    const ctx = document.getElementById('mainChart');
    if (!ctx) return;
    if (myChart) { myChart.destroy(); }

    // Pega técnicos únicos que REALMENTE existem nos dados filtrados
    const tecs = [...new Set(db.map(r => r.tecnico))].filter(t => t && t.trim() !== "");

    myChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: tecs,
            datasets: [
                { 
                    label: 'Concluídas', 
                    data: tecs.map(t => db.filter(r => r.tecnico === t && r.status === 'Concluída').length),
                    backgroundColor: '#10b981' 
                },
                { 
                    label: 'Agendadas', 
                    data: tecs.map(t => db.filter(r => r.tecnico === t && r.status === 'Agendada').length),
                    backgroundColor: '#3b82f6' 
                }
            ]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                x: { stacked: true, grid: { color: '#232d42' }, ticks: { color: '#94a3b8' } },
                y: { stacked: true, grid: { display: false }, ticks: { color: '#94a3b8' } }
            },
            plugins: { legend: { labels: { color: '#94a3b8' } } }
        }
    });
}

function createItemUI(v) {
    return `
        <div class="visit-item ${v.tipo}">
            <div style="display:flex; justify-content:space-between; align-items:start">
                <div>
                    <span style="font-weight:800; display:block;">${v.escola}</span>
                    <span style="color:var(--text-secondary); font-size:0.75rem;">📍 ${v.municipio}</span>
                </div>
                <span class="badge ${v.status === 'Agendada' ? 'st-agendada' : 'st-concluida'}">${v.status}</span>
            </div>
            <div style="margin-top:1rem; display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text-secondary)">
                <span>👨‍🔧 ${v.tecnico} • <b>${v.tipo}</b></span>
                <span>📅 ${v.data.split('-').reverse().join('/')}</span>
            </div>
            ${v.observacao ? `<div style="margin-top:10px; font-size:0.7rem; color:var(--text-secondary); font-style:italic">Obs: ${v.observacao}</div>` : ''}
        </div>
    `;
}

function renderCalendar() {
    const cal = document.getElementById('calendar');
    cal.innerHTML = '';
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    document.getElementById('monthLabel').innerText = `${months[month]} ${year}`;

    const firstDay = new Date(year, month, 1).getDay();
    const lastDay = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) cal.innerHTML += '<div class="day empty" style="border:none"></div>';

    for (let d = 1; d <= lastDay; d++) {
        const dStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const hasVisits = db.filter(v => v.data === dStr);
        const dayEl = document.createElement('div');
        dayEl.className = `day ${hasVisits.length ? 'has-visit' : ''}`;
        dayEl.innerText = d;
        dayEl.onclick = () => {
            document.querySelectorAll('.day').forEach(el => el.classList.remove('selected'));
            dayEl.classList.add('selected');
            document.getElementById('dayDetail').style.display = 'block';
            document.getElementById('dayList').innerHTML = hasVisits.map(createItemUI).join('') || '<p>Sem visitas.</p>';
        };
        cal.appendChild(dayEl);
    }
}

function setupFilters() {
    const tecs = [...new Set(db.map(r => r.tecnico))].filter(t => t).sort();
    const escs = [...new Set(db.map(r => r.escola))].filter(e => e).sort();
    
    document.getElementById('filterTec').innerHTML = '<option value="">Todos Técnicos</option>' + tecs.map(t => `<option>${t}</option>`).join('');
    document.getElementById('filterEsc').innerHTML = '<option value="">Selecionar Escola...</option>' + escs.map(e => `<option>${e}</option>`).join('');
    
    document.getElementById('filterTec').onchange = renderTecList;
    document.getElementById('searchEsc').oninput = renderTecList;
    document.getElementById('filterEsc').onchange = renderEscHistory;
}

function renderTecList() {
    const tec = document.getElementById('filterTec').value;
    const search = document.getElementById('searchEsc').value.toLowerCase();
    const list = db.filter(r => (!tec || r.tecnico === tec) && r.escola.toLowerCase().includes(search));
    document.getElementById('tecList').innerHTML = list.map(createItemUI).join('');
}

function renderEscHistory() {
    const esc = document.getElementById('filterEsc').value;
    const list = db.filter(r => r.escola === esc);
    document.getElementById('escHistory').innerHTML = list.map(createItemUI).join('');
}

function switchTab(id, btn) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
}

function changeMonth(dir) {
    currentDate.setMonth(currentDate.getMonth() + dir);
    renderCalendar();
}

init();
</script>
</body>
</html>
